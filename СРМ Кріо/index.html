<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpg" href="bol.jpg">
  <title>Вхід</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #009400, #004d00);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    label {
      display: block; 
      margin: 10px auto 5px auto; 
      font-weight: bold;
      width: 500px; 
      text-align: left;
    }
    input, select {
      width: 500px; 
      padding: 10px; 
      margin: 5px auto 15px auto;
      border: none; 
      border-radius: 6px; 
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      width: 200px; 
      padding: 12px; 
      margin: 10px 15px;
      background-color: #004d00; 
      color: #ffffff;
      border: solid 1px #c2ffc2; 
      border-radius: 6px; 
      font-size: 1rem;
      cursor: pointer; 
      transition: background 0.3s ease;
    }
    h1 { margin-top: 30px; }
    button:hover { background-color: #003300; }
    @media screen and (max-width: 480px) {
      label, input, select { width: 90%; font-size: 0.9rem; }
      button { width: 80%; font-size: 0.9rem; }
    }
    @media screen and (min-width: 481px) and (max-width: 768px) {
      label, input, select { width: 80%; font-size: 1rem; }
      button { width: 60%; font-size: 1rem; }
    }
    @media screen and (min-width: 769px) {
      label, input, select { width: 500px; }
      button { width: 200px; }
    }
  </style>
</head>
<body>
  <h1>Вхід</h1>
  <img src="./logo.svg" alt="logo" width="260">
  <div id="loginForm">
    <label>Ім’я користувача:
      <select id="username">
        <option value="">Виберіть користувача</option>
        <option value="demian">Дем'ян Загородній</option>
        <option value="vitaliy">Віталій Гаптенко</option>
        <option value="olga">Ольга Леонова</option>
        <option value="katya">Катерина Скрябіна</option>
        <option value="stavka">Ставка</option>
        <option value="admink">admin</option>
      </select>
    </label>
    <label>Пароль:
      <input type="password" id="password">
    </label>
    <button id="loginBtn">Увійти</button>
  </div>
  <img src="./ph.png" alt="logo" width="260">

  <script>
document.getElementById("loginBtn").addEventListener("click", async function() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (!u || !p) {
    alert("Будь ласка, введіть ім’я та пароль!");
    return;
  }

  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbyw4XPYemQbvxJ3IG1DIIbVOQhDjKlM3PR_dKwRWyO24hM_MdhcntM3bmcpk6gko7ff/exec", {
      method: "POST",
      mode: "no-cors", // 👈 додаємо цей режим
      body: JSON.stringify({ action: "login", userName: u, password: p }),
      headers: { "Content-Type": "application/json" }
    });

    // У режимі no-cors відповідь недоступна
    // Тому тут можна просто редіректити користувача
    localStorage.setItem("currentUser", u);
    window.location.href = "menu.html";

  } catch (err) {
    alert("Помилка з’єднання з сервером!");
    console.error(err);
  }
});
  </script>
</body>
</html>
