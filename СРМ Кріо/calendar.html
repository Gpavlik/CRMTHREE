  <script>
// Користувачі
const userNames = {
  demian: "Дем'ян Загородній",
  vitaliy: "Віталій Гаптенко",
  olga: "Ольга Леонова",
  katya: "Катерина Скрябіна",
  stavka: "Ставка",
};

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) {
  alert("Будь ласка, увійдіть спочатку!");
  window.location.href = "index.html";
} else {
  document.getElementById("userInfo").textContent =
    "Ви увійшли як: " + (userNames[currentUser] || currentUser);
}

let doctors = [];

// Завантаження лікарів з бекенду
async function loadDoctors() {
  const url = "https://docs.google.com/spreadsheets/d/1kgoYGolqlj9Wf5MuMNriTjiKqbLnEooa9S5gSXLlYYM/gviz/tq?tqx=out:json&sheet=Sheet1";
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows.map(r => r.c.map(c => c ? c.v : ""));

  doctors = rows.map(r => ({
    region: r[0],
    city: r[1],
    lpz: r[2],
    specialty: r[3],
    doctor: r[4],
    userName: r[5]
  }));

  // показуємо тільки лікарів поточного користувача
  const filteredDoctors = doctors.filter(d => d.userName === userNames[currentUser]);
  renderDoctorCards(filteredDoctors);
  initUniversalSearch(filteredDoctors);
  loadVisits();
}

document.addEventListener("DOMContentLoaded", () => {
  loadDoctors();
});

let calendar;

// Рендер карток лікарів
function renderDoctorCards(filtered = doctors) {
  const container = document.getElementById("doctorCards");
  container.innerHTML = "";

  if (!filtered.length) {
    container.innerHTML = "<p>Лікарів не знайдено.</p>";
    return;
  }

  filtered.forEach(d => {
    const card = document.createElement("div");
    card.className = "doctor-card fc-event";
    card.textContent = `${d.doctor} — ${d.specialty}, ${d.city}`;
    card.dataset.doctor = JSON.stringify(d);
    container.appendChild(card);
  });

  new FullCalendar.Draggable(container, {
    itemSelector: ".doctor-card",
    eventData: function(el) {
      const doctor = JSON.parse(el.dataset.doctor);
      return {
        title: doctor.doctor,
        extendedProps: doctor
      };
    }
  });
}

// Універсальний пошук
function initUniversalSearch(doctors) {
  const input = document.getElementById("searchInput");
  input.addEventListener("input", () => {
    const q = input.value.toLowerCase();
    const filtered = doctors.filter(d =>
      d.doctor.toLowerCase().includes(q) ||
      d.specialty.toLowerCase().includes(q) ||
      d.city.toLowerCase().includes(q) ||
      (d.userName && d.userName.toLowerCase().includes(q))
    );
    renderDoctorCards(filtered.filter(d => d.userName === userNames[currentUser]));
  });
  renderDoctorCards(doctors.filter(d => d.userName === userNames[currentUser]));
}

// Допоміжні функції
function isValidSlot(timeStr) {
  if (!timeStr) return false;
  timeStr = timeStr.trim().slice(0,5); // HH:MM
  const allowed = [];
  for (let h = 8; h <= 18; h++) {
    allowed.push(`${String(h).padStart(2,"0")}:00`);
    if (h !== 18) allowed.push(`${String(h).padStart(2,"0")}:30`);
  }
  return allowed.includes(timeStr);
}

function isPastDay(dateStr) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const chosen = new Date(dateStr.split("T")[0]);
  chosen.setHours(0,0,0,0);
  return chosen < today;
}

function normalizeDate(dateStr, timeStr) {
  dateStr = String(dateStr || "").trim();
  timeStr = String(timeStr || "").trim();

  // формат YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    return new Date(`${dateStr}T${timeStr || "00:00"}`);
  }

  // формат DD.MM.YYYY
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)) {
    const [day, month, year] = dateStr.split(".");
    return new Date(`${year}-${month}-${day}T${timeStr || "00:00"}`);
  }

  // формат "YYYY-MM-DD HH:MM"
  if (/^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}$/.test(dateStr + " " + timeStr)) {
    const [d, t] = (dateStr + " " + timeStr).split(" ");
    return new Date(`${d}T${t}`);
  }

  // fallback
  return new Date(`${dateStr}T${timeStr || "00:00"}`);
}
function isSlotFree(date, time, excludeEventId = null) {
  const start = normalizeDate(date, time);
  const end = new Date(start.getTime() + 30*60000);

  const events = calendar.getEvents();
  console.log("isSlotFree check:", date, time, "events:", events.map(e => e.id));

  return !events.some(ev => {
    if (!ev.id) return false; // 👈 ігноруємо тимчасові події без id
    if (excludeEventId && ev.id === excludeEventId) return false;
    const evStart = ev.start;
    const evEnd = ev.end || new Date(evStart.getTime() + 30*60000);
    return evStart < end && evEnd > start;
  });
}
// Стилізація події
function styleEvent(info) {
  const status = info.event.extendedProps.status || "";

  if (status === "Заплановано") {
    info.el.style.backgroundColor = "#1E90FF";
  } else if (status === "Перенесено") {
    info.el.style.backgroundColor = "#FFD700";
  } else if (status === "Відмінено") {
    info.el.style.backgroundColor = "#DC143C";
  } else if (status === "Виконано") {
    info.el.style.backgroundColor = "#32CD32";
  }

  const doctor = info.event.extendedProps.doctor || "(лікар не вказаний)";
  const comment = info.event.extendedProps.comment || "";
  info.el.setAttribute("title", `${doctor}\n${comment}`);

  info.event.setExtendedProp('elRef', info.el);
}

// Конфігурація календаря
const calendarEl = document.getElementById("calendar");
calendar = new FullCalendar.Calendar(calendarEl, {
  initialView: 'timeGridWeek',
  locale: 'uk',
  headerToolbar: {
    left: 'prev,next today',
    center: 'title',
    right: 'dayGridMonth,timeGridWeek,timeGridDay'
  },
  slotMinTime: "08:00:00",
  slotMaxTime: "19:00:00",
  allDaySlot: false,
  hiddenDays: [0, 6],
  firstDay: 1,
  editable: true,
  droppable: true,
  eventClick: handleEventClick,
  eventDidMount: styleEvent,

// Створення нового візиту
eventReceive: function(info) {
  if (info.event.extendedProps._received) {
    console.log("eventReceive skipped (already handled)");
    return;
  }
  info.event.setExtendedProp("_received", true);

  const doctor = JSON.parse(info.draggedEl.dataset.doctor);
  const start = info.event.start;
  const end = new Date(start.getTime() + 30*60000);

  const dateStr = start.toLocaleDateString("sv-SE");
  const timeStr = start.toLocaleTimeString("uk-UA", { hour: "2-digit", minute: "2-digit", hour12: false });

  console.log("eventReceive triggered:", dateStr, timeStr);

  if (isPastDay(dateStr)) {
    alert("Не можна запланувати візит у минулі дні");
    info.event.remove();
    return;
  }

  const visitId = `${dateStr}_${timeStr}`;
  info.event.setProp("id", visitId);

  const existing = calendar.getEvents().filter(ev => ev.id === visitId);
  if (existing.length > 1) {
    console.warn("Duplicate event detected, removing extra");
    info.event.remove();
    return;
  }

  if (!isSlotFree(dateStr, timeStr, visitId)) {
    alert("Цей час вже зайнятий іншим візитом");
    info.event.remove();
    return;
  }

  info.event.setEnd(end);
  info.event.setExtendedProp("status", "Заплановано");
  info.event.setExtendedProp("doctorName", doctor.doctor);
  info.event.setExtendedProp("specialty", doctor.specialty);
  info.event.setExtendedProp("city", doctor.city);
  info.event.setExtendedProp("region", doctor.region);
  info.event.setExtendedProp("lpz", doctor.lpz);
  info.event.setExtendedProp("userName", doctor.userName);
  info.event.setExtendedProp("visitId", visitId);
  info.event.setProp("title", `Заплановано: ${doctor.doctor}`);

  let visits = JSON.parse(localStorage.getItem("visits")) || [];
  if (!visits.some(v => v.visitId === visitId)) {
    visits.push({
      visitId,
      doctorName: doctor.doctor,
      specialty: doctor.specialty,
      city: doctor.city,
      region: doctor.region,
      lpz: doctor.lpz,
      status: "Заплановано",
      date: dateStr,
      time: timeStr,
      userName: doctor.userName
    });
    localStorage.setItem("visits", JSON.stringify(visits));
  }

  // ✅ виклик бекенду
  saveVisitInBackend(info.event);
},

// Перенесення існуючого візиту
eventDrop: function(info) {
  const event = info.event;
  const newDate = event.start.toLocaleDateString("sv-SE");
  const newTime = event.start.toLocaleTimeString("uk-UA", { hour: "2-digit", minute: "2-digit", hour12: false });

  console.log("eventDrop triggered:", newDate, newTime, "eventId:", event.id);

  if (isPastDay(newDate)) {
    console.warn("eventDrop: минулий день", newDate);
    alert("Не можна перенести візит у минуле");
    info.revert();
    return;
  }

  if (!isSlotFree(newDate, newTime, event.id)) {
    console.warn("eventDrop: слот зайнятий", event.id);
    alert("Цей час вже зайнятий іншим візитом");
    info.revert();
    return;
  }

  event.setExtendedProp('status', 'Перенесено');
  event.setProp('title', `Перенесено: ${event.extendedProps.doctor}`);

  const el = event.extendedProps.elRef;
  if (el) styleEvent({ event: event, el: el });

  updateDateInBackend(event, newDate, newTime);
}

});
calendar.render();  
loadVisits();

async function saveVisitInBackend(event) {
  try {
    const doctor = event.extendedProps;
    const res = await fetch("https://script.google.com/macros/s/AKfycbxMDNAS6nal0EJvDk1U33cXA8l3n0CVOuiEjdozUcpFZTWMliDRAJZmPp5COUW6LRIt/exec", {
method: "POST",
  mode: "no-cors",
  body: JSON.stringify({
    action: "saveCalendarEvent",
    userName: doctor.userName,
    doctor: doctor.doctor,
    date: event.start.toLocaleDateString("sv-SE"),
    time: event.start.toLocaleTimeString("uk-UA", { hour: "2-digit", minute: "2-digit", hour12: false }),
    status: doctor.status || "Заплановано",
    comment: doctor.comment || "",
    visitId: doctor.visitId,
    region: doctor.region,
    city: doctor.city,
    lpz: doctor.lpz,
    specialty: doctor.specialty
  })
});
console.log("Запит на бекенд відправлено (no-cors).");
  } catch (err) {
    console.error("Помилка при збереженні візиту в бекенді:", err);
  }
}

// Перенесення візиту
async function updateDateInBackend(event, newDate, newTime) {
  try {
    const doctor = event.extendedProps;

    await fetch("https://script.google.com/macros/s/AKfycbxMDNAS6nal0EJvDk1U33cXA8l3n0CVOuiEjdozUcpFZTWMliDRAJZmPp5COUW6LRIt/exec", {
      method: "POST",
      mode: "no-cors", // 👈 залишаємо no-cors
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "updateCalendarEvent",
        userName: doctor.userName,
        doctor: doctor.doctor,
        date: newDate,   // нова або поточна дата
        time: newTime,   // новий або поточний час
        status: event.extendedProps.status || "Заплановано", // актуальний статус
        comment: doctor.comment || "",
        visitId: event.extendedProps.visitId, // 👈 завжди беремо з фронтенду
        region: doctor.region,
        city: doctor.city,
        lpz: doctor.lpz,
        specialty: doctor.specialty
      })
    });

    console.log("Запит updateCalendarEvent відправлено (no-cors).");
  } catch (err) {
    console.error("Помилка відправки updateCalendarEvent:", err);
  }
}

// Функція показу модалки підтвердження
function showConfirmModal(event, message, onYes, onNo) {
  const modal = document.getElementById("visitModal");

  // Дані лікаря над кнопками
  const doctorName = event.extendedProps.doctorName || "(лікар не вказаний)";
  const specialty = event.extendedProps.specialty || "";
  const region = event.extendedProps.region || "";
  const city = event.extendedProps.city || "";
  const lpz = event.extendedProps.lpz || "";
  const userName = event.extendedProps.userName || "";

  modal.querySelector(".doctor-info").innerHTML = `
    <strong>${doctorName}</strong><br>
    ${specialty}, ${city}<br>
    ${region}<br>
    ЛПЗ: ${lpz}<br>
    Запланував: ${currentUserKey ? userNames[currentUserKey] : "невідомий користувач"}
  `;

    document.getElementById("confirmTitle").innerText = message;
    modal.style.display = "block";

  const yesBtn = document.getElementById("confirmYes");
  const noBtn = document.getElementById("confirmNo");

  yesBtn.onclick = () => {
    modal.style.display = "none";
    if (onYes) onYes();
  };
  noBtn.onclick = () => {
    modal.style.display = "none";
    if (onNo) onNo();
  };
}

// Закриття модалки при кліку поза нею
window.onclick = function(event) {
  const modal = document.getElementById("visitModal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
};

// Клік по події → модалка з даними лікаря
function handleEventClick(info) {
  const event = info.event;
  const doctor = event.extendedProps.doctor || "(лікар не вказаний)";
  const specialty = event.extendedProps.specialty || "";
  const region = event.extendedProps.region || "";
  const city = event.extendedProps.city || "";
  const lpz = event.extendedProps.lpz || "";
  const userName = event.extendedProps.userName || "";
  const status = event.extendedProps.status;

  // ❌ Відмінені та виконані візити не редагуються
  if (status === "Відмінено" || status === "Виконано") {
    return;
  }

  const modal = document.getElementById("visitModal");
  modal.querySelector(".doctor-info").innerHTML = `
    <strong>${doctor}</strong><br>
    ${specialty}, ${city}<br>
    Запланував: ${userName}
  `;
  document.getElementById("modalTitle").innerText = event.title;
  modal.style.display = "block";

  // Кнопка "Почати"
document.getElementById("startBtn").onclick = async () => {
  const today = new Date(); today.setHours(0,0,0,0);
  const visitDay = new Date(event.start); visitDay.setHours(0,0,0,0);

  if (visitDay < today) {
    alert("Неможливо почати візит у минулому дні");
    return;
  }

  // ✅ міняємо статус локально
  event.setExtendedProp("status", "Виконано");
  event.setProp("title", `Виконано: ${doctor}`);

  const el = event.extendedProps.elRef;
  if (el) styleEvent({ event, el });

  // ✅ формуємо поточну дату/час
  const newDate = new Date().toLocaleDateString("sv-SE"); // формат YYYY-MM-DD
  const newTime = new Date().toLocaleTimeString("uk-UA", { hour: "2-digit", minute: "2-digit", hour12: false });

  // ✅ відправляємо у бекенд (оновлює і статус, і дату/час)
  await updateDateInBackend(event, newDate, newTime);

  modal.style.display = "none";

  // передаємо дані лікаря на сторінку docvisit.html
  const doctorData = { doctor, specialty, lpz, city, region, visitId: event.extendedProps.visitId };
  localStorage.setItem("selectedDoctor", JSON.stringify(doctorData));
  window.location.href = "docvisit.html";
};


  // Кнопка "Перенести"
  const rescheduleBtn = document.getElementById("rescheduleBtn");
  const newDateInput = document.getElementById("newDate");
  const newTimeInput = document.getElementById("newTime");
  const confirmRescheduleBtn = document.getElementById("confirmReschedule");

  if (status !== "Заплановано") {
    rescheduleBtn.style.display = "none";
    newDateInput.style.display = "none";
    newTimeInput.style.display = "none";
    confirmRescheduleBtn.style.display = "none";
  } else {
    rescheduleBtn.style.display = "inline-block";
    rescheduleBtn.onclick = () => {
      newDateInput.style.display = "inline";
      newTimeInput.style.display = "inline";
      confirmRescheduleBtn.style.display = "inline-block";
    };

    confirmRescheduleBtn.onclick = () => {
      const newDate = newDateInput.value;
      const newTime = newTimeInput.value;
      if (!newDate || !newTime) return;

      const newStart = normalizeDate(newDate, newTime);
      if (new Date(newStart) < new Date()) {
        alert("Не можна перенести візит у минуле");
        return;
      }
      if (!isSlotFree(newDate, newTime, event.id)) {
        alert("Цей час вже зайнятий іншим візитом");
        return;
      }

      // ✅ оновлюємо статус локально
      event.setExtendedProp("status", "Перенесено");
      event.setProp("title", `Перенесено: ${doctor}`);

      // ✅ відправляємо у бекенд
      updateDateInBackend(event, newDate, newTime);

      modal.style.display = "none";
    };
  }

  // Кнопка "Відмінити"
  document.getElementById("cancelBtn").onclick = () => {
    showConfirmModal(event, "Ви справді хочете відмінити цей візит?", () => {
      event.setExtendedProp("status", "Відмінено");
      event.setProp("title", `Відмінено: ${doctor}`);

      const newDate = event.start.toLocaleDateString("sv-SE");
      const newTime = event.start.toLocaleTimeString("uk-UA", { hour: "2-digit", minute: "2-digit", hour12: false });
      updateDateInBackend(event, newDate, newTime);

      modal.style.display = "none";
    });
  };
}


// Завантаження візитів з бекенду
async function loadVisits() {
  try {
    const currentUserKey = localStorage.getItem("currentUser");
    const currentUserName = userNames[currentUserKey];

    let localVisits = JSON.parse(localStorage.getItem("visits")) || [];
    renderVisits(localVisits);

    const res = await fetch("https://script.google.com/macros/s/AKfycbxMDNAS6nal0EJvDk1U33cXA8l3n0CVOuiEjdozUcpFZTWMliDRAJZmPp5COUW6LRIt/exec?type=calendar");
    if (!res.ok) throw new Error("Backend error: " + res.status);

    const backendVisits = await res.json();
    const myVisits = backendVisits.filter(v => v.userName === currentUserName);

    if (JSON.stringify(localVisits) !== JSON.stringify(myVisits)) {
      localStorage.setItem("visits", JSON.stringify(myVisits));
      renderVisits(myVisits);
    }
  } catch (err) {
    console.error("Помилка завантаження:", err);
  }
}

function renderVisits(visits) {
  calendar.getEvents().forEach(e => e.remove());

  visits.forEach(v => {
    const startDateTime = normalizeDate(v.date, v.time);
    if (isNaN(startDateTime.getTime())) {
      console.warn("Некоректна дата/час у візиті:", v);
      return; // пропускаємо цей запис
    }

    const endDateTime = new Date(startDateTime);
    endDateTime.setMinutes(endDateTime.getMinutes() + 30);

    calendar.addEvent({
      id: v.visitId,
      title: `${v.status}: ${v.doctor}`, // 👈 краще використовувати doctor, а не partnerName
      start: startDateTime,
      end: endDateTime, // можна передати Date напряму
      extendedProps: v
    });
  });
}


  function startVisit(event) {
  const now = new Date();
  const currentDate = now.toISOString().slice(0,10); // yyyy-MM-dd
  const currentTime = now.toTimeString().slice(0,5); // HH:mm

  // локально змінюємо статус і заголовок
  event.setExtendedProp('status', 'Виконано');
  event.setProp('title', `Виконано: ${event.extendedProps.doctor}`);

  const el = event.extendedProps.elRef;
  if (el) styleEvent({ event: event, el: el });

  // головне — викликати бекенд‑оновлення
  updateDateInBackend(event, currentDate, currentTime);
}
