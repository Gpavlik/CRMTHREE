@media (max-width: 480px) {
  h1 { font-size: 1.4rem; }

<script>

// Користувачі
const userNames = {
  fedir: "Олександр Красніков",
  olena: "Тетяна Романовська",
  office: "Офіс",
  andriy: "Тетяна Кліменко",
  maria: "Тетяна Демус",
  serhiy: "Ілона Бабенко"
};

const currentUser = localStorage.getItem("currentUser");
if (!currentUser) {
  alert("Будь ласка, увійдіть спочатку!");
  window.location.href = "login.html";
} else {
  document.getElementById("userInfo").textContent =
    "Ви увійшли як: " + (userNames[currentUser] || currentUser);
}
let doctorsData = [];

// 1. Отримання даних з Google Sheets
async function fetchDoctors() {
  const url = "https://docs.google.com/spreadsheets/d/1qDgXP8HJgP7R90u33me9ENAKcAQwdpu_b6YJvL9E48Y/gviz/tq?tqx=out:json&sheet=Sheet1";
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  doctorsData = json.table.rows.map(r => ({
    region: r.c[0]?.v || "",
    city: r.c[1]?.v || "",
    lpz: r.c[2]?.v || "",
    specialty: r.c[3]?.v || "",
    doctor: r.c[4]?.v || ""
  }));

  populateRegions();
}
function normalizeSpecialty(name) {
  if (!name) return "";
  name = name.trim().toLowerCase();
  if (name.includes("отолар")) return "Отоларингологія"; // будь-який варіант отоларингології
  if (name.includes("гінек")) return "Гінекологія";
  if (name.includes("гастр")) return "Гастроентерологія";
  return name;
}

// 2. Заповнення селектів з фільтром по користувачу
function populateRegions() {
  const regionSelect = document.getElementById("regionSelect");
  let regions = [...new Set(doctorsData.map(d => d.region))];

  if (currentUser === "fedir") {
    const allowed = ["Київська","Житомирська","Чернігівська","Одеська"];
    regions = regions.filter(r => allowed.some(a => r.includes(a)));
  } else if (currentUser === "olena") {
    const excluded = ["Київська","Житомирська","Чернігівська","Одеська"];
    regions = regions.filter(r => !excluded.some(a => r.includes(a)));
  } else {
    regions = [];
  }

  fillSelect(regionSelect, regions);
}


function populateCities(region) {
  const cities = [...new Set(doctorsData.filter(d => d.region === region).map(d => d.city))];
  fillSelect(document.getElementById("citySelect"), cities);
}

function populateLpz(region, city) {
  const lpzList = [...new Set(
    doctorsData.filter(d => d.region === region && d.city === city).map(d => d.lpz)
  )];
  fillSelect(document.getElementById("lpzSelect"), lpzList);

  // підключаємо фільтр
  const filterInput = document.getElementById("lpzFilter");
  filterInput.oninput = () => {
    const query = filterInput.value.toLowerCase();
    const filtered = lpzList.filter(lpz => lpz.toLowerCase().includes(query));
    fillSelect(document.getElementById("lpzSelect"), filtered);
  };
}


function populateSpecialties(region, city, lpz) {
  const specialties = [...new Set(doctorsData.filter(d => d.region === region && d.city === city && d.lpz === lpz).map(d => d.specialty))];
  fillSelect(document.getElementById("specialtySelect"), specialties);
}

function populateDoctors(region, city, lpz, specialty) {
  const doctors = [...new Set(doctorsData.filter(d => d.region === region && d.city === city && d.lpz === lpz && d.specialty === specialty).map(d => d.doctor))];
  fillSelect(document.getElementById("doctorSelect"), doctors);
}

// Допоміжна функція
function fillSelect(select, values) {
  select.innerHTML = "<option value=''>Оберіть...</option>";
  values.forEach(val => {
    if (val) {
      const opt = document.createElement("option");
      opt.value = val;
      opt.textContent = val;
      select.appendChild(opt);
    }
  });
}

// 3. Продукти залежно від спеціальності
// Мапа спеціальність → продукти
const productsMap = {
  "Отоларингологія": ["StrA"],
  "Гінекологія": ["Solomini№5","CLpH№25","CLpH№1","ActimPROM"],
  "Гастроентерологія": ["HPAg"]
};

// Мапа спеціальність → презентація
const presentationsMap = {
  "Отоларингологія": "ЛОР.pdf",
  "Гінекологія": "гінеколог.pdf",
  "Гастроентерологія": "гастроентеролог.pdf"
};

function renderProductsAndPresentation(specialty) {
  // 1. Генерація продуктів
  const tbody = document.getElementById("currentVisitBody");
  tbody.innerHTML = "";

  const products = productsMap[specialty] || [];
  products.forEach(prod => {

    `;
    tbody.appendChild(tr);

// 2. Генерація кнопки для презентації
const btnContainer = document.querySelector(".buttons");
let presentationBtn = document.getElementById("presentationBtn");

if (!presentationBtn) {
  presentationBtn = document.createElement("button");
  presentationBtn.id = "presentationBtn";
  btnContainer.insertBefore(presentationBtn, btnContainer.firstChild);
}

const file = presentationsMap[specialty]; // тут у тебе шлях до PDF

// 4. Ініціалізація
document.addEventListener("DOMContentLoaded", () => {
  fetchDoctors();

  document.getElementById("regionSelect").addEventListener("change", e => populateCities(e.target.value));
  document.getElementById("citySelect").addEventListener("change", e => {
    const region = document.getElementById("regionSelect").value;
    populateLpz(region, e.target.value);
  });
  document.getElementById("lpzSelect").addEventListener("change", e => {
    const region = document.getElementById("regionSelect").value;
    const city = document.getElementById("citySelect").value;
    populateSpecialties(region, city, e.target.value);
  });
  document.getElementById("specialtySelect").addEventListener("change", e => {
  const region = document.getElementById("regionSelect").value;
  const city = document.getElementById("citySelect").value;
  const lpz = document.getElementById("lpzSelect").value;
  populateDoctors(region, city, lpz, e.target.value);

  const specialty = normalizeSpecialty(e.target.value);

});
document.getElementById("doctorSelect").addEventListener("change", e => {
  const doctorName = e.target.value;
  if (doctorName) {
    loadPreviousVisit(doctorName);
  }
});
 
});

pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let pdfDoc = null;
let currentPage = 1;
let shownSlides = [];

async function openPresentation(url) {
  const modal = document.getElementById("presentationModal");
  modal.style.display = "block";
  shownSlides = [];
  currentPage = 1;

  pdfDoc = await pdfjsLib.getDocument(url).promise;
  renderPage(currentPage);
  generatePagePanel();
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d");

    const containerWidth = document.querySelector(".modal-content").clientWidth;
    const viewport = page.getViewport({ scale: 1 });
    const scale = containerWidth / viewport.width;
    const scaledViewport = page.getViewport({ scale });

    canvas.height = scaledViewport.height;
    canvas.width = scaledViewport.width;

    page.render({ canvasContext: ctx, viewport: scaledViewport });

    if (!shownSlides.includes(num)) {
      shownSlides.push(num);
    }
  });
}

function generatePagePanel() {
  const panel = document.getElementById("pagePanel");
  panel.innerHTML = "";

  const prevBtn = document.createElement("button");
  prevBtn.textContent = "←";
  prevBtn.classList.add("arrow");
  prevBtn.onclick = prevSlide;
  panel.appendChild(prevBtn);

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;
    btn.classList.add("page");
    if (i === currentPage) btn.classList.add("active");
    btn.onclick = () => {
      currentPage = i;
      renderPage(currentPage);
      generatePagePanel();
    };
    panel.appendChild(btn);
  }

  const nextBtn = document.createElement("button");
  nextBtn.textContent = "→";
  nextBtn.classList.add("arrow");
  nextBtn.onclick = nextSlide;
  panel.appendChild(nextBtn);
}

function prevSlide() {
  if (currentPage > 1) {
    currentPage--;
    renderPage(currentPage);
    generatePagePanel();
  }
}

function nextSlide() {
  if (currentPage < pdfDoc.numPages) {
    currentPage++;
    renderPage(currentPage);
    generatePagePanel();
  }
}

document.getElementById("closeModal").onclick = () => {
  document.getElementById("presentationModal").style.display = "none";
};

// свайпи
const canvas = document.getElementById("pdfCanvas");
let startX = 0, startY = 0;

canvas.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;

  if (endX - startX > 50) {
    prevSlide();
  } else if (startX - endX > 50) {
    nextSlide();
  } else if (endY - startY > 50) {
    document.querySelector(".slide-controls").classList.add("show");
  }
});

function zoomIn() {
  scale += 0.25;
  renderPage(currentPage);
}

function zoomOut() {
  if (scale > 0.5) {
    scale -= 0.25;
    renderPage(currentPage);
  }
}

// Закриття модалки
document.getElementById("closeModal").onclick = () => {
  document.getElementById("presentationModal").style.display = "none";
};
window.onclick = (event) => {
  const modal = document.getElementById("presentationModal");
  if (event.target === modal) modal.style.display = "none";
};

document.getElementById('saveVisitBtn').onclick = async () => {
  // показуємо модалку очікування
  document.getElementById('loadingModal').style.display = 'flex';

  try {
    await saveDoctorVisit(); // твоя функція відправки на бекенд
      // невелика пауза, щоб бекенд встиг записати
    setTimeout(() => {
      location.reload();
    }, 10000);// після успішного збереження — оновлення сторінки
     } catch (err) {
    alert("Помилка при збереженні даних");
    console.error(err);
    // ховаємо модалку, щоб користувач міг повторити дію
    document.getElementById('loadingModal').style.display = 'none';
  }
};

async function saveDoctorVisit() {
  if (!validateVisitForm()) return;

  const currentUser = localStorage.getItem("currentUser");
  const userName = userNames[currentUser] || currentUser || "Невідомий користувач";

  const now = new Date();
  const date = now.toLocaleDateString("uk-UA");
  const time = now.toLocaleTimeString("uk-UA");

  const region = document.getElementById("regionSelect").value;
  const city = document.getElementById("citySelect").value;
  const lpz = document.getElementById("lpzSelect").value;
  const specialty = document.getElementById("specialtySelect").value;
  const doctor = document.getElementById("doctorSelect").value;

  const rows = document.querySelectorAll("#currentVisitBody tr");
  const visitsData = [];

  rows.forEach(row => {
    const product = row.querySelector("td.product").innerText;
    const agreement = row.querySelector("input.agreement").value;
    const competitors = row.querySelector("input.competitors")?.value || "";

    visitsData.push({
      product,
      agreement,
      competitors,
      presentationShown: shownSlides.length > 0 ? "Так" : "Ні",
      slides: shownSlides.join(",")
    });
  });

  // 🆕 Генеруємо VisitID один раз
const urlParams = new URLSearchParams(window.location.search);
let visitId = urlParams.get("visitId");
if (!visitId) {
  visitId = Date.now(); // якщо не з календаря
}


  // 🔎 Отримуємо координати перед відправкою
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    try {
      await fetch("https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          action: "saveDoctorVisit",
          userName,
          date,
          time,
          region,
          city,
          lpz,
          specialty,
          doctor,
          lat,
          lon,
          visitId,       // ← той самий VisitID
          data: visitsData
        }),
        headers: { "Content-Type": "application/json" }
      });
      alert("Візит відправлено на збереження!");
      document.getElementById('loadingModal').style.display = 'none';
    } catch (error) {
      console.error("Помилка при збереженні:", error);
      alert("Сталася помилка при збереженні візиту.");
    }
  }, err => {
    console.error("❌ Помилка GPS:", err);
    alert("Не вдалося отримати координати, але візит буде збережено без них.");
    // fallback: відправка без координат
    fetch("https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        action: "saveDoctorVisit",
        userName,
        date,
        time,
        region,
        city,
        lpz,
        specialty,
        doctor,
        visitId,       // ← той самий VisitID
        data: visitsData
      }),
      headers: { "Content-Type": "application/json" }
    });
  });
}



function validateVisitForm() {
  const region = document.getElementById("regionSelect").value;
  const city = document.getElementById("citySelect").value;
  const lpz = document.getElementById("lpzSelect").value;
  const specialty = document.getElementById("specialtySelect").value;
  const doctor = document.getElementById("doctorSelect").value;

  let valid = true;

  [region, city, lpz, specialty, doctor].forEach((val, idx) => {
    const select = [document.getElementById("regionSelect"), document.getElementById("citySelect"), document.getElementById("lpzSelect"), document.getElementById("specialtySelect"), document.getElementById("doctorSelect")][idx];
    if (!val) {
      select.classList.add("error");
      valid = false;
    } else {
      select.classList.remove("error");
    }
  });

  if (!valid) alert("Будь ласка, заповніть всі поля перед збереженням.");
  return valid;
}
async function loadPreviousVisit(doctorName) {
  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec?type=doctor&doctor=" 
      + encodeURIComponent(doctorName)
    );
    const visits = await res.json();

    const tbody = document.getElementById("previousVisitBody");
    tbody.innerHTML = "";

    // 👉 фільтруємо тільки візити до цього лікаря
    const doctorVisits = visits.filter(v => v.doctor === doctorName);

    if (doctorVisits.length > 0) {
      // знаходимо останню дату серед цього лікаря
      const lastDate = doctorVisits[doctorVisits.length - 1].date;

      // фільтруємо всі рядки з цією датою
      const lastVisits = doctorVisits.filter(v => v.date === lastDate);

      lastVisits.forEach(v => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${v.date}</td>
          <td>${v.product}</td>
          <td>${v.agreement}</td>
          <td>${v.competitors}</td>
        `;
        tbody.appendChild(tr);
      });
    } else {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="7">Попередніх візитів до цього лікаря не знайдено</td>`;
      tbody.appendChild(tr);
    }
  } catch (err) {
    console.error("Помилка завантаження попереднього візиту:", err);
    const tbody = document.getElementById("previousVisitBody");
    tbody.innerHTML = `<tr><td colspan="7">Не вдалося підтягнути попередній візит (CORS)</td></tr>`;
  }
}
