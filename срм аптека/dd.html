// ===== Форматування чисел =====
function formatThousands(num) {
  return Number(num || 0).toLocaleString("uk-UA");
}

// ===== Анімація семисегментника =====
function animateSevenSeg(targetValue, elementId, suffix="") {
  const el = document.getElementById(elementId);
  if (!el) return;
  let current = 0;
  const step = Math.max(1, Math.ceil(targetValue / 100)); // швидкість приросту
  const interval = setInterval(() => {
    current += step;
    if (current >= targetValue) {
      current = targetValue;
      clearInterval(interval);
    }
    el.textContent = suffix
      ? current.toFixed(1) + suffix
      : formatThousands(current);
  }, 20);
}

// ===== Оновлення одного блоку =====
function updateSevenSegBlock(planRows, partners, quarter, mode, prefix) {
  const planKey = `2026_${quarter.replace("Q","")}`;
  const selectedPartnerIds = $("#partnerSelect").val() || [];
  const selectedProducts   = $("#productSelect").val() || [];

  let plan = 0, fact = 0;

  if (mode === "green") {
    // Загальний дисплей — ігнорує селектори
    planRows.forEach(row => { plan += row.planMoney?.[planKey] || 0; });
    partners.forEach(p => {
      p.products.forEach(prod => { fact += prod.historyMoney?.[planKey] || 0; });
    });
  }

if (mode === "blue") {
  partners.forEach(p => {
    // фільтр по партнерах
    if (selectedPartnerIds.length > 0 && !selectedPartnerIds.includes(String(p.id))) return;

    if (selectedProducts.length > 0) {
      // якщо вибрано продукт → беремо його
      p.products.forEach(prod => {
        if (selectedProducts.includes(prod.product)) {
          plan += prod.planMoney || 0;
          fact += prod.execMoney || 0;
        }
      });
    } else {
      // якщо продукт не вибрано → беремо "Всього"
      const totalRow = p.products.find(pr => pr.product === "Всього");
      if (totalRow) {
        plan += totalRow.planMoney || 0;
        fact += totalRow.execMoney || 0;
      }
    }
  });
}


  if (mode === "red") {
    // По продуктах — беремо план напряму з таблиці
    planRows.forEach(row => {
      if (selectedProducts.length > 0 && !selectedProducts.includes(row.product)) return;
      plan += row.planMoney?.[planKey] || 0;
    });
    partners.forEach(p => {
      if (selectedPartnerIds.length > 0 && !selectedPartnerIds.includes(String(p.id))) return;
      p.products.forEach(prod => {
        if (selectedProducts.length > 0 && !selectedProducts.includes(prod.product)) return;
        fact += prod.historyMoney?.[planKey] || 0;
      });
    });
  }

  const percent = plan > 0 ? (fact / plan) * 100 : 0;

  animateSevenSeg(plan, prefix);
  animateSevenSeg(fact, prefix+"1");
  animateSevenSeg(percent, prefix+"2", "%");
}

// ===== Отримання партнерів із Google Sheets =====
async function fetchPartners(morionUrl) {
  const url = `${morionUrl}/gviz/tq?tqx=out:json&sheet=sheet1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  return json.table.rows.map(r => {
    const corpRaw = r.c[0]?.v || "";
    const idMatch = corpRaw.match(/^(\d+)/);
    const id = idMatch ? parseInt(idMatch[1], 10) : 0;
    const name = corpRaw.replace(/^(\d+)\.\s*/, "");

    return {
      id,
      name,
      turnover: parseFloat(String(r.c[1]?.v || 0).replace(/\s|,/g, "")) || 0,
      msr: parsePercent(r.c[2]?.v),
      grossRate: parsePercent(r.c[3]?.v),
      ei: parseFloat(String(r.c[4]?.v || 0).replace(/\s|,/g, "")) || 0,
      tt: parseIntClean(r.c[5]?.v || 0)
    };
  }).filter(p => p.id && p.name && !p.name.includes("Rating"));
}

// ===== Отримання історії по партнеру =====
async function fetchHistory(partnerId, historyUrl, partnerData) {
  const partnerName = partnerData.find(p => p.id === partnerId)?.name || `Партнер ${partnerId}`;
  const url = `${historyUrl}/gviz/tq?tqx=out:json&range='${partnerId}'!A1:Z1000`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  const cols = json.table.cols.map(c => c.label);
  const rows = json.table.rows.map(r => r.c.map(c => c?.v || ""));

  let products = [];
  let mode = "money";
  let firstProduct = null;
  let seenFirstAgain = false;

  rows.forEach(r => {
    const product = r[2];
    if (!product || product === "ТовардляПлана" || product === "Всього") return;

    if (!firstProduct) {
      firstProduct = product;
    } else if (product === firstProduct && !seenFirstAgain) {
      mode = "packs";
      seenFirstAgain = true;
    }

    let prod = products.find(p => p.product === product);
    if (!prod) {
      prod = { partnerId, partnerName, product, historyMoney: {}, historyPacks: {} };
      products.push(prod);
    }

    cols.forEach((col, idx) => {
      if (/^202[56]_\d$/.test(col)) {
        const val = Math.round(parseNum(r[idx]));
        if (mode === "money") prod.historyMoney[col] = val;
        else prod.historyPacks[col] = val;
      }
    });
  });
  return products;
}

// ===== Отримання планів =====
async function fetchPlan(planUrl) {
  const url = `${planUrl}/gviz/tq?tqx=out:json&sheet=sheet1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  const rows = json.table.rows.map(r => r.c.map(c => c?.v || ""));

  return rows.map(r => {
    const product = r[0];
    if (!product) return null;
    return {
      product,
      planMoney: {
        "2026_1": parseFloat(r[1]) || 0,
        "2026_2": parseFloat(r[2]) || 0,

function parseNum(v) {
  if (v === null || v === "" || v === undefined) return 0;
  const num = parseFloat(String(v).replace(/\s/g, ""));
  return isNaN(num) ? 0 : num;
}

function parsePercent(raw) {
  if (!raw) return 0;
  let s = String(raw).trim().replace(/[\s\u00A0,]/g, "").replace("%", "");
  let v = parseFloat(s);
  if (isNaN(v)) return 0;
  return v;
}

function parseIntClean(raw) {
  if (!raw) return 0;
  const s = String(raw).replace(/[^\d-]/g, "");
  const v = parseInt(s, 10);
  return isNaN(v) ? 0 : v;
}

// ===== Розподіл планів між партнерами =====
function distributePlanForPartners(plans, partners, quarter) {
  const keyPrev = `2025_${quarter.replace("Q","")}`;
  const keyCurr = `2026_${quarter.replace("Q","")}`;

  plans.forEach(plan => {
    const totalMoney = plan.planMoney[keyCurr] || 0;
    const totalPacks = plan.planPacks[keyCurr] || 0;

    // гарантуємо, що у кожного партнера є продукт
    partners.forEach(p => {
      if (!p.products.find(pr => pr.product === plan.product)) {
        p.products.push({ product: plan.product });
      }
    });

    // 1. базові дольові плани
    let shares = partners.map(p => {
      const prod = p.products.find(pr => pr.product === plan.product);
      const historyPacks = prod ? (prod.historyPacks?.[keyPrev] || 0) : 0;
      const baseShare = totalPacks * (p.msr / 100);

      let share;
      const allHistoryZero = partners.every(x => {
        const h = x.products.find(pr => pr.product === plan.product)?.historyPacks?.[keyPrev] || 0;
        return h === 0;
      });

      if (allHistoryZero) {
        share = baseShare;
      } else if (historyPacks > baseShare) {
        share = historyPacks;
      } else {
        share = (historyPacks * p.ei) / 100;
      }

      return { partner: p, share, historyPacks };
    });

    // 2. нормалізація
    let sumShares = shares.reduce((s, x) => s + x.share, 0);
    if (sumShares > 0) {
      shares.forEach(x => {
        x.share = x.share * (totalPacks / sumShares);
      });
    }

    // 3. алгоритм залишку для упаковок
    let fractionalShares = shares.map(x => ({ partner: x.partner, share: x.share }));
    let allocated = fractionalShares.map(x => ({
      partner: x.partner,
      packs: Math.floor(x.share)
    }));

    let allocatedSum = allocated.reduce((s, x) => s + x.packs, 0);
    let remainder = totalPacks - allocatedSum;

    fractionalShares
      .map((x, i) => ({ idx: i, frac: x.share - allocated[i].packs }))
      .sort((a, b) => b.frac - a.frac)
      .slice(0, remainder)
      .forEach(x => { allocated[x.idx].packs += 1; });

    // 4. запис у продукти
    allocated.forEach(x => {
      const prod = x.partner.products.find(pr => pr.product === plan.product);
      if (prod) {
        const planPacks = x.packs;
        const execPacks = prod.historyPacks?.[keyCurr] || 0;
        const toSellPacks = Math.max(planPacks - execPacks, 0);

        prod.planPacks   = planPacks;
        prod.execPacks   = execPacks;
        prod.toSellPacks = toSellPacks;

        const execMoney    = prod.historyMoney?.[keyCurr] || 0;
        const pricePerPack = totalPacks > 0 ? (totalMoney / totalPacks) : 0;
        const planMoney    = planPacks * pricePerPack;
        const toSellMoney  = Math.max(planMoney - execMoney, 0);

        prod.planMoney   = Math.round(planMoney);
        prod.execMoney   = execMoney;
        prod.toSellMoney = Math.round(toSellMoney);

        prod.percentExecPacks = planPacks > 0 ? ((execPacks / planPacks) * 100).toFixed(2) + "%" : "0.00%";
        prod.percentExecMoney = planMoney > 0 ? ((execMoney / planMoney) * 100).toFixed(2) + "%" : "0.00%";
      }
    });

    // 5. контрольний рядок
    const sumPlanPacks = allocated.reduce((s, x) => s + x.packs, 0);
    const sumPlanMoney = allocated.reduce((s, x) => {
      const pricePerPack = totalPacks > 0 ? (totalMoney / totalPacks) : 0;
      return s + x.packs * pricePerPack;
    }, 0);

    console.log(`▶ Контроль по продукту ${plan.product}:`);
    console.log(`   План з таблиці: ${totalPacks.toLocaleString("uk-UA")} упак. / ${totalMoney.toLocaleString("uk-UA")} грн`);
    console.log(`   Сума розподілу: ${sumPlanPacks.toLocaleString("uk-UA")} упак. / ${Math.round(sumPlanMoney).toLocaleString("uk-UA")} грн`);
  });

  // 6. додаємо рядок "Всього" для кожного партнера
  partners.forEach(p => {
    let totalPlan = 0, totalExec = 0;
    p.products.forEach(prod => {
      totalPlan += prod.planMoney || 0;
      totalExec += prod.execMoney || 0;
    });
    let totalRow = p.products.find(pr => pr.product === "Всього");
    if (!totalRow) {
      totalRow = { product: "Всього" };
      p.products.push(totalRow);
    }
    totalRow.planMoney = totalPlan;
    totalRow.execMoney = totalExec;
  });

  return partners;
}



function renderHistoryPlans(partners, quarter, historyType, selectedProducts = []) {
  let html = "<h3>Історія та плани</h3>";

  const allProducts = [...new Set(partners.flatMap(p => p.products.map(pr => pr.product)))];

html += `
  <table>
    <tr>
      <th>Партнер</th>
      <th id="productHeader" class="product-header">▶ Продукт
        <div id="productFilterContainer" class="product-filter">
          ${allProducts.map(prod => {
            const checked = selectedProducts.includes(prod) ? "checked" : "";
            return `
              <label class="filter-option">
                <input type="checkbox" value="${prod}" ${checked}>
                <span>${prod}</span>
              </label>
            `;
          }).join("")}
        </div>
      </th>
      <th>Історія</th>
      <th>План</th>
      <th>Виконано</th>
      <th>Допродати</th>
      <th>Дольовий</th>
      <th>Супер</th>
      <th>Подобається</th>
      <th>Задовільнить</th>
      <th>Замислитися</th>
      <th>Піти</th>
    </tr>
`;

  const keyPrev = `2025_${quarter.replace("Q","")}`;

  let totalHistory = 0, totalPlan = 0, totalExec = 0, totalToSell = 0;

  partners.forEach(p => {
    p.products
      .filter(prod => selectedProducts.length === 0 || selectedProducts.includes(prod.product))
      .forEach(prod => {
        const history = historyType === "money"
          ? Math.round(prod.historyMoney?.[keyPrev] || 0)
          : Math.round(prod.historyPacks?.[keyPrev] || 0);

        const plan = historyType === "money"
          ? Math.round(prod.planMoney || 0)
          : Math.round(prod.planPacks || 0);

        const exec = historyType === "money"
          ? Math.round(prod.execMoney || 0)
          : Math.round(prod.execPacks || 0);

        const toSell = historyType === "money"
          ? Math.round(prod.toSellMoney || 0)
          : Math.round(prod.toSellPacks || 0);

        const base = historyType === "money" ? Math.round(prod.baseMoney || 0) : Math.round(prod.basePacks || 0);
        const superV = historyType === "money" ? Math.round(prod.superMoney || 0) : Math.round(prod.superPacks || 0);
        const optimal = historyType === "money" ? Math.round(prod.optimalMoney || 0) : Math.round(prod.optimalPacks || 0);
        const satisfy = historyType === "money" ? Math.round(prod.satisfyMoney || 0) : Math.round(prod.satisfyPacks || 0);
        const think = historyType === "money" ? Math.round(prod.thinkMoney || 0) : Math.round(prod.thinkPacks || 0);
        const go = historyType === "money" ? Math.round(prod.goMoney || 0) : Math.round(prod.goPacks || 0);

        const growth = (val) => {
          if (!history || history === 0) return "";
          const perc = ((val - history) / history * 100).toFixed(0);
          return ` / ${perc > 0 ? "+" : ""}${perc}%`;
        };

        const ratio = plan > 0 ? Math.min(toSell / plan, 1) : 1;
        const hue = (1 - ratio) * 120;
        const bgColor = `hsl(${hue}, 70%, 45%)`;

        html += `<tr>
          <td>${p.name}</td>
          <td>${prod.product}</td>
          <td>${formatNumber(history)}</td>
          <td>${plan ? formatNumber(plan) : "-"}</td>
          <td>${exec ? formatNumber(exec) : "-"}</td>
          <td style="background-color:${bgColor};color:white;font-weight:bold;">${toSell ? formatNumber(toSell) : "-"}</td>
          <td>${base ? formatNumber(base) + growth(base) : "-"}</td>
          <td>${superV ? formatNumber(superV) + growth(superV) : "-"}</td>
          <td>${optimal ? formatNumber(optimal) + growth(optimal) : "-"}</td>
          <td>${satisfy ? formatNumber(satisfy) + growth(satisfy) : "-"}</td>
          <td>${think ? formatNumber(think) + growth(think) : "-"}</td>
          <td>${go ? formatNumber(go) + growth(go) : "-"}</td>
        </tr>`;

        totalHistory += history;
        totalPlan += plan;
        totalExec += exec;
        totalToSell += toSell;
      });
  });

  html += `<tr class="total-row" style="font-weight:bold;background:#000;">
    <td colspan="2">Сума</td>
    <td>${formatNumber(totalHistory)}</td>
    <td>${formatNumber(totalPlan)}</td>
    <td>${formatNumber(totalExec)}</td>
    <td>${formatNumber(totalToSell)}</td>
    <td colspan="6"></td>
  </tr>`;

  html += "</table>";
  document.getElementById("historyPlans").innerHTML = html;

  // відкриття/закриття випадаючого списку
  const header = document.getElementById("productHeader");
  const filterContainer = document.getElementById("productFilterContainer");

  header.addEventListener("click", (e) => {
    e.stopPropagation();
    filterContainer.style.display = filterContainer.style.display === "none" ? "block" : "none";
  });

  // закриття при кліку поза списком
  document.addEventListener("click", () => {
    if (filterContainer.style.display === "block") {
      const selected = Array.from(document.querySelectorAll("#productFilterContainer input[type=checkbox]:checked"))
                            .map(o => o.value);
      filterContainer.style.display = "none";
      renderHistoryPlans(partners, quarter, historyType, selected);
    }
  });

  // щоб клік всередині списку не закривав його
  filterContainer.addEventListener("click", (e) => {
    e.stopPropagation();
  });
}

function parseDate(str) {
  if (!str) return null;
  if (str.includes(".")) {
    const [day, month, year] = str.split(".");
    return new Date(parseInt(year), parseInt(month)-1, parseInt(day));
  }
  return new Date(str); // ISO формат
}
