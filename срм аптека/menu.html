body {

button {

/* 📱 Телефони (до 480px) */

  button {
    width: 100%; /* кнопки на всю ширину */

  }

  }
  h1 {
    font-size: 1.5rem; /* менший заголовок */
  }
}
/* 📲 Планшети (481px–768px) */

  button {
    width: 90%; /* ширші кнопки */

<script>
// ===== Користувачі =====
const userNames = {
  fedir: "Олександр Красніков",
  olena: "Тетяна Романовська",
  office: "Офіс",
  andriy: "Тетяна Кліменко",
  maria: "Тетяна Демус",
  serhiy: "Ілона Бабенко",
  admin: "admin"
};

const currentUser = localStorage.getItem("currentUser") || "admin";

// ===== План на день =====
const planDay = { gastro:1, oto:2, gyn:5, partner:1, pharmacy:4 };

// ===== Кешування =====
function saveCache(type, data, lastRow) {
  localStorage.setItem(type + "Cache", JSON.stringify(data));
  localStorage.setItem(type + "LastRow", lastRow);
}

function loadCache(type) {
  const raw = localStorage.getItem(type + "Cache");
  if (!raw) {
    // якщо кеш ще не створений — ініціалізуємо пустий масив
    localStorage.setItem(type + "Cache", JSON.stringify([]));
    return [];
  }
  return JSON.parse(raw);
}

function loadLastRow(type) {
  const raw = localStorage.getItem(type + "LastRow");
  if (!raw) {
    localStorage.setItem(type + "LastRow", 1); // перший рядок — шапка
    return 1;
  }
  return Number(raw);
}



async function fetchIncremental(type, userKey) {
  const lastRow = loadLastRow(type);
  const url = `https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec?type=${type}&userName=${userNames[userKey]}&lastRow=${lastRow}`;
  console.log(`🔗 Інкрементальний запит: ${url}`);

  try {
    const resp = await fetch(url);
    const data = await resp.json();

    let cache = loadCache(type);

    if (data.length > 0) {
      // визначаємо ключ унікальності залежно від типу
      const makeKey = (v) => {
        if (type === "doctor") return v.date + "_" + v.doctor;
        if (type === "partner") return v.date + "_" + v.partnerName;
        if (type === "pharmacy") return v.date + "_" + v.partnerName + "_" + v.address;
        return v.visitId || (v.date + "_" + v.time);
      };

      const seen = new Set(cache.map(makeKey));
      const fresh = data.filter(v => !seen.has(makeKey(v)));

      if (fresh.length > 0) {
        cache = cache.concat(fresh);
        const newLastRow = lastRow + fresh.length;
        saveCache(type, cache, newLastRow);
        console.log(`✅ Оновлено кеш [${type}]: додано ${fresh.length} нових записів`);
      } else {
        console.log(`ℹ️ Нових даних для [${type}] немає`);
      }
    }

    return cache;
  } catch (err) {
    console.error(`❌ Помилка запиту [${type}]:`, err);
    return loadCache(type);
  }
}


// ===== Допоміжні функції =====
function countWorkingDays(startDate, endDate) {
  let count = 0, d = new Date(startDate);
  while (d <= endDate) {
    const day = d.getDay();
    if (day !== 0 && day !== 6) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function uniqueDoctorVisits(visits) {
  const set = new Set();
  visits.forEach(v => set.add(v.date + "_" + v.doctor));
  return set.size;
}
function uniquePartnerVisits(visits) {
  const set = new Set();
  visits.forEach(v => set.add(v.date + "_" + v.partnerName));
  return set.size;
}

// ===== Глобальні змінні для спідометрів =====
let gaugeDay, gaugeWeek, gaugeMonth, gaugeQuarter;

// ===== Ініціалізація спідометрів =====
function initGauges() {
  gaugeDay = new JustGage({ id:"gaugeDay", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
  gaugeWeek = new JustGage({ id:"gaugeWeek", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
  gaugeMonth = new JustGage({ id:"gaugeMonth", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
  gaugeQuarter = new JustGage({ id:"gaugeQuarter", value:0, min:0, max:100, label:"%", levelColors:["#30B32D","#FFDD00","#F03E3E"], pointer:true });
}

// ===== Оновлення спідометра =====
function updateGauge(id, value) {
  if (id === "gaugeDay" && gaugeDay) gaugeDay.refresh(value);
  if (id === "gaugeWeek" && gaugeWeek) gaugeWeek.refresh(value);
  if (id === "gaugeMonth" && gaugeMonth) gaugeMonth.refresh(value);
  if (id === "gaugeQuarter" && gaugeQuarter) gaugeQuarter.refresh(value);
}
function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}
// ===== Основна логіка =====
function loadData(userKey) {
  const specialty = $("#specialtyFilter").val();

  const today = new Date();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay() + 1);
  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate() + 6);

  const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);

  const quarter = Math.floor(today.getMonth() / 3);
  const startOfQuarter = new Date(today.getFullYear(), quarter * 3, 1);
  const endOfQuarter = new Date(today.getFullYear(), quarter * 3 + 3, 0);

  const periods = {
    day: { start: today, end: today },
    week: { start: startOfWeek, end: endOfWeek },
    month: { start: startOfMonth, end: endOfMonth },
    quarter: { start: startOfQuarter, end: endOfQuarter }
  };

  const userName = userNames[userKey] || userKey;

  let doctorVisits = loadCache("doctor").filter(v => v.userName === userName);
  let partnerVisits = loadCache("partner")
    .filter(v => v.userName === userName)
    .map(v => ({ ...v, specialty: "Партнер" }));
  let pharmacyVisits = loadCache("pharmacy")
    .filter(v => v.userName === userName)
    .map(v => ({ ...v, specialty: "Аптека" }));

  for (const [key, period] of Object.entries(periods)) {
    redrawGauges(key, doctorVisits, partnerVisits, pharmacyVisits, specialty, period);
  }
}

// ===== Перемальовування спідометрів =====
function redrawGauges(key, doctorVisits, partnerVisits, pharmacyVisits, specialty, period) {
  // фільтруємо лікарські
  doctorVisits = doctorVisits.filter(v => {
    const d = parseDate(v.date);
    if (!d) return false;
    if (key === "day") return isSameDay(d, period.start);
    return d >= period.start && d <= period.end;
  });

  // фільтруємо партнерські
  partnerVisits = partnerVisits.filter(v => {
    const d = parseDate(v.date);
    if (!d) return false;
    if (key === "day") return isSameDay(d, period.start);
    return d >= period.start && d <= period.end;
  });

  // фільтруємо аптечні
  pharmacyVisits = pharmacyVisits.filter(v => {
    const d = parseDate(v.date);
    if (!d) return false;
    if (key === "day") return isSameDay(d, period.start);
    return d >= period.start && d <= period.end;
  });

  let factTotal = 0;
  let planTotal = 0;
  const days = countWorkingDays(period.start, period.end);

  if (specialty === "Партнер") {
    factTotal = uniquePartnerVisits(partnerVisits);
    planTotal = planDay.partner * days;

  } else if (specialty === "Аптека") {
    factTotal = uniquePharmacyVisits(pharmacyVisits); // унікальність по даті+адресі
    planTotal = planDay.pharmacy * days;

  } else if (specialty && specialty !== "Всі спеціальності") {
    const filteredDoctors = doctorVisits.filter(v => 
      v.specialty && v.specialty.trim().toLowerCase() === specialty.trim().toLowerCase()
    );
    factTotal = uniqueDoctorVisits(filteredDoctors);

    const specNorm = specialty.trim().toLowerCase();
    if (specNorm === "гастроентерологія") planTotal = planDay.gastro * days;
    else if (specNorm === "отоларингологія") planTotal = planDay.oto * days;
    else if (specNorm === "гінекологія") planTotal = planDay.gyn * days;

  } else {
    const factDoctors = uniqueDoctorVisits(doctorVisits);
    const factPartners = uniquePartnerVisits(partnerVisits);
    const factPharmacy = uniquePharmacyVisits(pharmacyVisits);
    factTotal = factDoctors + factPartners + factPharmacy;
    planTotal = (planDay.gastro + planDay.oto + planDay.gyn + planDay.partner + planDay.pharmacy) * days;
  }

  const percent = planTotal > 0 ? (factTotal / planTotal) * 100 : 0;
  const gaugeId = "gauge" + key.charAt(0).toUpperCase() + key.slice(1);

  updateGauge(gaugeId, percent);

  const infoId = gaugeId + "Info";
  document.getElementById(infoId).textContent =
    `Факт: ${factTotal} | План: ${planTotal} | ${percent.toFixed(1)}%`;
}

// ===== Унікальність аптечних візитів =====
function uniquePharmacyVisits(visits) {
  const set = new Set();
  visits.forEach(v => set.add(v.date + "_" + v.address));
  return set.size;
}

function parseDate(str) {
  if (!str) return null;
  if (str.includes(".")) {
    const [day, month, year] = str.split(".");
    return new Date(parseInt(year), parseInt(month)-1, parseInt(day));
  }
  return new Date(str); // ISO формат
}

// ===== Отримання історії по партнеру =====
async function fetchHistory(partnerId, historyUrl, partnerData) {
  const partnerName = partnerData.find(p => p.id === partnerId)?.name || `Партнер ${partnerId}`;
  const url = `${historyUrl}/gviz/tq?tqx=out:json&range='${partnerId}'!A1:Z1000`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  const cols = json.table.cols.map(c => c.label);
  const rows = json.table.rows.map(r => r.c.map(c => c?.v || ""));

  let products = [];
  let mode = "money";
  let firstProduct = null;
  let seenFirstAgain = false;

  rows.forEach(r => {
    const product = r[2];
    if (!product || product === "ТовардляПлана" || product === "Всього") return;

    if (!firstProduct) {
      firstProduct = product;
    } else if (product === firstProduct && !seenFirstAgain) {
      mode = "packs";
      seenFirstAgain = true;
    }

    let prod = products.find(p => p.product === product);
    if (!prod) {
      prod = { partnerId, partnerName, product, historyMoney: {}, historyPacks: {} };
      products.push(prod);
    }

    cols.forEach((col, idx) => {
      if (/^202[56]_\d$/.test(col)) {
        const val = Math.round(parseNum(r[idx]));
        if (mode === "money") prod.historyMoney[col] = val;
        else prod.historyPacks[col] = val;
      }
    });
  });
  return products;
}
// ===== Допоміжні парсери =====
function parseNum(v) {
  if (v === null || v === "" || v === undefined) return 0;
  const num = parseFloat(String(v).replace(/\s/g, ""));
  return isNaN(num) ? 0 : num;
}

function parsePercent(raw) {
  if (!raw) return 0;
  let s = String(raw).trim().replace(/[\s\u00A0,]/g, "").replace("%", "");
  let v = parseFloat(s);
  if (isNaN(v)) return 0;
  return v;
}

function parseIntClean(raw) {
  if (!raw) return 0;
  const s = String(raw).replace(/[^\d-]/g, "");
  const v = parseInt(s, 10);
  return isNaN(v) ? 0 : v;
}

// ===== Розподіл планів між партнерами =====
function distributePlanForPartners(plans, partners, quarter) {
  const keyPrev = `2025_${quarter.replace("Q","")}`;
  const keyCurr = `2026_${quarter.replace("Q","")}`;

  plans.forEach(plan => {
    const totalMoney = plan.planMoney[keyCurr] || 0;
    const totalPacks = plan.planPacks[keyCurr] || 0;

    // гарантуємо, що у кожного партнера є продукт
    partners.forEach(p => {
      if (!p.products.find(pr => pr.product === plan.product)) {
        p.products.push({ product: plan.product });
      }
    });

    // 1. базові дольові плани
    let shares = partners.map(p => {
      const prod = p.products.find(pr => pr.product === plan.product);
      const historyPacks = prod ? (prod.historyPacks?.[keyPrev] || 0) : 0;
      const baseShare = totalPacks * (p.msr / 100);

      let share;
      const allHistoryZero = partners.every(x => {
        const h = x.products.find(pr => pr.product === plan.product)?.historyPacks?.[keyPrev] || 0;
        return h === 0;
      });

      if (allHistoryZero) {
        share = baseShare;
      } else if (historyPacks > baseShare) {
        share = historyPacks;
      } else {
        share = (historyPacks * p.ei) / 100;
      }

      return { partner: p, share, historyPacks };
    });

    // 2. нормалізація
    let sumShares = shares.reduce((s, x) => s + x.share, 0);
    if (sumShares > 0) {
      shares.forEach(x => {
        x.share = x.share * (totalPacks / sumShares);
      });
    }

    // 3. алгоритм залишку для упаковок
    let fractionalShares = shares.map(x => ({ partner: x.partner, share: x.share }));
    let allocated = fractionalShares.map(x => ({
      partner: x.partner,
      packs: Math.floor(x.share)
    }));

    let allocatedSum = allocated.reduce((s, x) => s + x.packs, 0);
    let remainder = totalPacks - allocatedSum;

    fractionalShares
      .map((x, i) => ({ idx: i, frac: x.share - allocated[i].packs }))
      .sort((a, b) => b.frac - a.frac)
      .slice(0, remainder)
      .forEach(x => { allocated[x.idx].packs += 1; });

    // 4. запис у продукти
    allocated.forEach(x => {
      const prod = x.partner.products.find(pr => pr.product === plan.product);
      if (prod) {
        const planPacks = x.packs;
        const execPacks = prod.historyPacks?.[keyCurr] || 0;
        const toSellPacks = Math.max(planPacks - execPacks, 0);

        prod.planPacks   = planPacks;
        prod.execPacks   = execPacks;
        prod.toSellPacks = toSellPacks;

        const execMoney    = prod.historyMoney?.[keyCurr] || 0;
        const pricePerPack = totalPacks > 0 ? (totalMoney / totalPacks) : 0;
        const planMoney    = planPacks * pricePerPack;
        const toSellMoney  = Math.max(planMoney - execMoney, 0);

        prod.planMoney   = Math.round(planMoney);
        prod.execMoney   = execMoney;
        prod.toSellMoney = Math.round(toSellMoney);

        prod.percentExecPacks = planPacks > 0 ? ((execPacks / planPacks) * 100).toFixed(2) + "%" : "0.00%";
        prod.percentExecMoney = planMoney > 0 ? ((execMoney / planMoney) * 100).toFixed(2) + "%" : "0.00%";
      }
    });

    // 5. контрольний рядок
    const sumPlanPacks = allocated.reduce((s, x) => s + x.packs, 0);
    const sumPlanMoney = allocated.reduce((s, x) => {
      const pricePerPack = totalPacks > 0 ? (totalMoney / totalPacks) : 0;
      return s + x.packs * pricePerPack;
    }, 0);

    console.log(`▶ Контроль по продукту ${plan.product}:`);
    console.log(`   План з таблиці: ${totalPacks.toLocaleString("uk-UA")} упак. / ${totalMoney.toLocaleString("uk-UA")} грн`);
    console.log(`   Сума розподілу: ${sumPlanPacks.toLocaleString("uk-UA")} упак. / ${Math.round(sumPlanMoney).toLocaleString("uk-UA")} грн`);
  });

  // 6. додаємо рядок "Всього" для кожного партнера
  partners.forEach(p => {
    let totalPlan = 0, totalExec = 0;
    p.products.forEach(prod => {
      totalPlan += prod.planMoney || 0;
      totalExec += prod.execMoney || 0;
    });
    let totalRow = p.products.find(pr => pr.product === "Всього");
    if (!totalRow) {
      totalRow = { product: "Всього" };
      p.products.push(totalRow);
    }
    totalRow.planMoney = totalPlan;
    totalRow.execMoney = totalExec;
  });

  return partners;
}

// ===== Анімація семисегментника =====
function animateSevenSeg(targetValue, elementId, suffix="") {
  const el = document.getElementById(elementId);
  if (!el) return;
  let current = 0;
  const step = Math.max(1, Math.ceil(targetValue / 100)); // швидкість приросту
  const interval = setInterval(() => {
    current += step;
    if (current >= targetValue) {
      current = targetValue;
      clearInterval(interval);
    }
    el.textContent = suffix
      ? current.toFixed(1) + suffix
      : Number(current).toLocaleString("uk-UA");
  }, 20);
}

// ===== Оновлення одного блоку =====
function updateSevenSegBlock(planRows, partners, quarter, mode, prefix) {
  const planKey = `2026_${quarter.replace("Q","")}`;
  const selectedPartnerIds = $("#partnerSelect").val() || [];
  const selectedProducts   = $("#productSelect").val() || [];

  let plan = 0, fact = 0;

  if (mode === "green") {
    // Загальний дисплей — ігнорує селектори
    planRows.forEach(row => { plan += row.planMoney?.[planKey] || 0; });
    partners.forEach(p => {
      p.products.forEach(prod => { fact += prod.historyMoney?.[planKey] || 0; });
    });
  }

  if (mode === "blue") {
    partners.forEach(p => {
      if (selectedPartnerIds.length > 0 && !selectedPartnerIds.includes(String(p.id))) return;

      if (selectedProducts.length > 0) {
        p.products.forEach(prod => {
          if (selectedProducts.includes(prod.product)) {
            plan += prod.planMoney || 0;
            fact += prod.execMoney || 0;
          }
        });
      } else {
        const totalRow = p.products.find(pr => pr.product === "Всього");
        if (totalRow) {
          plan += totalRow.planMoney || 0;
          fact += totalRow.execMoney || 0;
        }
      }
    });
  }

  if (mode === "red") {
    planRows.forEach(row => {
      if (selectedProducts.length > 0 && !selectedProducts.includes(row.product)) return;
      plan += row.planMoney?.[planKey] || 0;
    });
    partners.forEach(p => {
      if (selectedPartnerIds.length > 0 && !selectedPartnerIds.includes(String(p.id))) return;
      p.products.forEach(prod => {
        if (selectedProducts.length > 0 && !selectedProducts.includes(prod.product)) return;
        fact += prod.historyMoney?.[planKey] || 0;
      });
    });
  }

  const percent = plan > 0 ? (fact / plan) * 100 : 0;

  animateSevenSeg(plan, prefix);
  animateSevenSeg(fact, prefix+"1");
  animateSevenSeg(percent, prefix+"2", "%");
}
// ===== Отримання партнерів із Google Sheets з фільтрацією по userKey =====
async function fetchPartners(morionUrl, userKey) {
  const url = `${morionUrl}/gviz/tq?tqx=out:json&sheet=sheet1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  const allPartners = json.table.rows.map(r => {
    const corpRaw = r.c[0]?.v || "";
    const idMatch = corpRaw.match(/^(\d+)/);
    const id = idMatch ? parseInt(idMatch[1], 10) : 0;
    const name = corpRaw.replace(/^(\d+)\.\s*/, "");

    return {
      id,
      name,
      turnover: parseFloat(String(r.c[1]?.v || 0).replace(/\s|,/g, "")) || 0,
      msr: parsePercent(r.c[2]?.v),
      grossRate: parsePercent(r.c[3]?.v),
      ei: parseFloat(String(r.c[4]?.v || 0).replace(/\s|,/g, "")) || 0,
      tt: parseIntClean(r.c[5]?.v || 0)
    };
  }).filter(p => p.id && p.name && !p.name.includes("Rating"));

  // фільтрація під конкретного користувача
  const ids = userMap[userKey] || [];
  return (userKey === "admin") ? allPartners : allPartners.filter(p => ids.includes(p.id));
}


// ===== Ініціалізація селектора партнерів =====
function initPartners(userKey) {
  const partners = JSON.parse(localStorage.getItem("partners")) || [];

    placeholder: "Оберіть партнера",

  });

    selectedPartnerName = $(this).val() || "";
  });
}


// ===== Ініціалізація селектора продуктів =====
function initProducts(planRows) {
  const productSelect = $("#productSelect");
  productSelect.empty();
  productSelect.append(`<option value="">Всі продукти</option>`);

  planRows.forEach(row => {
    if (row && row.product) {
      productSelect.append(new Option(row.product, row.product));
    }
  });

  productSelect.select2({
    placeholder: "Оберіть продукт",
    allowClear: true,
    width: "300px"
  });

  productSelect.on("change", function() {
    selectedProductName = $(this).val() || "";
  });
}

// ===== Ініціалізація селекторів =====
$(document).ready(function() {
  $("#partnerSelect").select2({ placeholder: "Оберіть партнера", allowClear: true, width: '300px' });
  $("#productSelect").select2({ placeholder: "Оберіть продукт", allowClear: true, width: '300px' });

  if (currentUser === "admin") {
    document.getElementById("userFilter").style.display = "block";
  }

 // Виклик при зміні селектора користувача → повне перезавантаження
$("#userFilter").on("change", reloadDashboard);

// Виклик при зміні селектора партнера чи продукту → тільки фільтрація
$("#partnerSelect").on("change", () => {
  updateAllSevenSeg(plans, allPartners, quarter);
});
$("#productSelect").on("change", () => {
  updateAllSevenSeg(plans, allPartners, quarter);
});

});

// ===== Виклик при завантаженні сторінки =====

document.addEventListener("DOMContentLoaded", () => {
  (async function initDashboard() {
    const userKey = resolveUserKey();

    // 1. Отримати партнерів
    const morionUrl = "https://docs.google.com/spreadsheets/d/1CUEcXgBAUIKvg0k2JePbhSH-_S01HcEi";
    const partners = await fetchPartners(morionUrl, userKey);
    localStorage.setItem("partners", JSON.stringify(partners));
    initPartners(userKey);

    // 2. Отримати плани
    const plans = await getPlans(userKey);
    initProducts(plans);

    // 3. Історія + розподіл
    const historyUrl = getHistoryUrl(userKey);
    const ids = userMap[userKey] || [];
    let allPartners = [];
    for (let id of ids) {
      const products = await fetchHistory(id, historyUrl, partners);
      const d = partners.find(p => p.id === id);
      if (!d) continue;
      allPartners.push({ ...d, products });
    }

    distributePlanForPartners(plans, allPartners, getCurrentQuarter());
    updateAllSevenSeg(plans, allPartners, getCurrentQuarter());
  })();
});

// ===== Оновлення всіх дисплеїв =====
function updateAllSevenSeg(plans, partners, quarter) {
  updateSevenSegBlock(plans, partners, quarter, "blue", "moneyBlue");
  updateSevenSegBlock(plans, partners, quarter, "red", "moneyRed");
  updateSevenSegBlock(plans, partners, quarter, "green", "moneyGreen");
}
</script>
