const historyUrl = getHistoryUrl(currentUser);
async function fetchPartners(morionUrl) {
  const url = `${morionUrl}/gviz/tq?tqx=out:json&sheet=sheet1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  return json.table.rows.map(r => {
    const corpRaw = r.c[0]?.v || "";
    const idMatch = corpRaw.match(/^(\d+)/);
    const id = idMatch ? parseInt(idMatch[1], 10) : 0;
    const name = corpRaw.replace(/^(\d+)\.\s*/, "");

    const grossRaw = r.c[3]?.v;
    const grossRate = parsePercent(grossRaw); // повертає значення у відсотках (наприклад 0.29 або 28.03)

    const ttRaw = r.c[5]?.v || 0;
    const tt = parseIntClean(ttRaw); // коректно парсить "1 234", "1 234", "1,234"

    return {
      id,
      name,
      turnover: parseFloat(String(r.c[1]?.v || 0).replace(/\s|,/g, "")) || 0,
      msTable: parsePercent(r.c[2]?.v), // напряму з таблиці, у відсотках
      grossRate,
      ei: parseFloat(String(r.c[4]?.v || 0).replace(/\s|,/g, "")) || 0,
      tt: r.c[5]?.v || "0"
    };
  }).filter(p => p.id && p.name && !p.name.includes("Rating"));
}

function parseNum(v) {
  if (v === null || v === "" || v === undefined) return 0;
  const num = parseFloat(String(v).replace(/\s/g, ""));
  return isNaN(num) ? 0 : num;
}

async function fetchHistory(partnerId, historyUrl, partnerData) {
  const partnerName = partnerData.find(p => p.id === partnerId)?.name || `Партнер ${partnerId}`;
  const url = `${historyUrl}/gviz/tq?tqx=out:json&range='${partnerId}'!A1:Z1000`;
  const res2 = await fetch(url);
  const text2 = await res2.text();
  const json2 = JSON.parse(text2.substr(47).slice(0, -2));

  const cols = json2.table.cols.map(c => c.label);
  const rows = json2.table.rows.map(r => r.c.map(c => c?.v || ""));

  let products = [];
  let mode = "money";
  let firstProduct = null;
  let seenFirstAgain = false;

  rows.forEach(r => {
    const product = r[2];
    if (!product || product === "ТовардляПлана" || product === "Всього") return;

    if (!firstProduct) {
      firstProduct = product;
    } else if (product === firstProduct && !seenFirstAgain) {
      mode = "packs";
      seenFirstAgain = true;
      console.log("▶ Перехід на блок упаковок для партнера", partnerId);
    }

    let prod = products.find(p => p.product === product);
    if (!prod) {
      prod = { partnerId, partnerName, product, historyMoney: {}, historyPacks: {} };
      products.push(prod);
    }

    cols.forEach((col, idx) => {
      if (/^202[56]_\d$/.test(col)) {
        const val = Math.round(parseNum(r[idx]));
        if (mode === "money") {
          prod.historyMoney[col] = val;
        } else {
          prod.historyPacks[col] = val;
        }
      }
    });
  });

  console.log("▶ fetchHistory: результат", products);
  return products;
}

async function fetchPlan(planUrl) {
  const url = `${planUrl}/gviz/tq?tqx=out:json&sheet=sheet1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  const rows = json.table.rows.map(r => r.c.map(c => c?.v || ""));

  return rows.map(r => {
    const product = r[0];
    if (!product) return null;

    return {
      product,
      planMoney: {
        "2026_1": parseFloat(r[1]) || 0,
        "2026_2": parseFloat(r[2]) || 0,
        "2026_3": parseFloat(r[3]) || 0,
        "2026_4": parseFloat(r[4]) || 0
      },
      planPacks: {
        "2026_1": parseFloat(r[5]) || 0,
        "2026_2": parseFloat(r[6]) || 0,
        "2026_3": parseFloat(r[7]) || 0,
        "2026_4": parseFloat(r[8]) || 0
      }
    };
  }).filter(Boolean);
}

function classifyPartner(p, allPartners, quarter) {
  // ключ для вибраного кварталу
  const historyKey = `2025_${quarter.replace("Q","")}`;

  // сума історії по вибраному кварталу для конкретного партнера
  const totalHistory = p.products.reduce((sum, prod) => {
    return sum + (prod.historyMoney?.[historyKey] || 0);
  }, 0);

  // середня історія по всіх партнерах за цей квартал
  const avgHistory = allPartners.reduce((s, x) => {
    const h = x.products.reduce((sum, prod) => {
      return sum + (prod.historyMoney?.[historyKey] || 0);
    }, 0);
    return s + h;
  }, 0) / allPartners.length;

  // середнє значення MSр
  const avgMsr = allPartners.reduce((s, x) => s + (x.msr || 0), 0) / allPartners.length;

  const highHistory = totalHistory >= avgHistory;
  const highMsr = p.msr >= avgMsr;

  if (highHistory && highMsr) return { type: "Життєво важливий", cls: "vital" };
  if (!highHistory && highMsr) return { type: "Цінний", cls: "valuable" };
  if (highHistory && !highMsr) return { type: "Прийнятний", cls: "acceptable" };
  return { type: "Заважаючий", cls: "interfering" };
}

function calculateUserTotals(planRows, partners, quarter, userKey) {
  const ids = userMap[userKey] || [];
  const historyKey = `2025_${quarter.replace("Q","")}`;
  const execKey1   = `2026_${quarter.replace("Q","")}`;
  const execKey2   = `2026_Q${quarter.replace("Q","")}`;
  const planKey1   = `2026_${quarter.replace("Q","")}`;
  const planKey2   = `2026_Q${quarter.replace("Q","")}`;

  let totalHistory = 0;
  let totalExec = 0;

  partners.forEach(p => {
    if (!ids.includes(p.id)) return;
    if (!Array.isArray(p.products)) return;

    p.products.forEach(prod => {
      totalHistory += prod.historyMoney?.[historyKey] || 0;
      totalExec    += prod.historyMoney?.[execKey1] || prod.historyMoney?.[execKey2] || 0;
    });
  });

  let totalPlan = 0;
  planRows.forEach(row => {
    totalPlan += row.planMoney?.[planKey1] || row.planMoney?.[planKey2] || 0;
  });

  const percentExec = totalPlan > 0 ? ((totalExec / totalPlan) * 100) : 0;
  const percentExecStr = percentExec.toFixed(2) + "%";

  return {
    totalHistory: Math.round(totalHistory).toLocaleString("uk-UA"),
    totalPlan: Math.round(totalPlan).toLocaleString("uk-UA"),
    totalExec: Math.round(totalExec).toLocaleString("uk-UA"),
    percentExec: percentExecStr
  };
}

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function formatPlan(value, history) {
  const roundedValue = Math.ceil(value);
  const delta = history > 0 ? Math.ceil(((value - history) / history * 100)) : 0;
  const sign = delta >= 0 ? "+" : "";
  return `${roundedValue} / ${sign}${delta}%`;
}

// Форматування чисел з відбиттям тисяч
function formatNumber(num) {
  return Number(num || 0).toLocaleString("uk-UA");
}

// Парсинг відсотків з різних форматів
function parsePercent(raw) {
  if (raw === null || raw === undefined || raw === "") return 0;
  let s = String(raw).trim();
  const hasPercentSign = s.includes("%");
  // прибираємо пробіли, NBSP, коми
  s = s.replace(/[\s\u00A0,]/g, "");
  // прибираємо знак %
  s = s.replace("%", "");
  if (s === "") return 0;
  let v = parseFloat(s);
  if (isNaN(v)) return 0;
  // Якщо джерело дав дуже мале дробове значення (наприклад 0.0029),
  // ймовірно це 0.29% — піднімаємо до зручного відсоткового формату.
  // Але якщо значення вже у вигляді 0.18 (тобто 0.18%), не множимо.
  if (!hasPercentSign && v > 0 && v < 0.01) {
    v = v * 100;
  }
  return v;
}

// Парсинг цілих чисел (ТТ, суми) — прибираємо будь-які нецифрові символи
function parseIntClean(raw) {
  if (raw === null || raw === undefined || raw === "") return 0;
  const s = String(raw).replace(/[^\d-]/g, "");
  const v = parseInt(s, 10);
  return isNaN(v) ? 0 : v;
}


function distributePlanForPartners(plans, partners, quarter) {
  const keyPrev = `2025_${quarter.replace("Q","")}`;
  const keyCurr = `2026_${quarter.replace("Q","")}`;

  plans.forEach(plan => {
    const totalMoney = plan.planMoney[keyCurr] || 0;
    const totalPacks = plan.planPacks[keyCurr] || 0;

    // гарантуємо, що у кожного партнера є продукт
    partners.forEach(p => {
      if (!p.products.find(pr => pr.product === plan.product)) {
        p.products.push({ product: plan.product });
      }
    });

    // 1. базові дольові плани
    let shares = partners.map(p => {
      const prod = p.products.find(pr => pr.product === plan.product);
      const historyPacks = prod ? (prod.historyPacks?.[keyPrev] || 0) : 0;
      const baseShare = totalPacks * (p.msr / 100);

      let share;
      const allHistoryZero = partners.every(x => {
        const h = x.products.find(pr => pr.product === plan.product)?.historyPacks?.[keyPrev] || 0;
        return h === 0;
      });

      if (allHistoryZero) {
        share = baseShare;
      } else if (historyPacks > baseShare) {
        share = historyPacks;
      } else {
        share = (historyPacks * p.ei) / 100;
      }

      return { partner: p, share, historyPacks };
    });

    // нормалізація
    let sumShares = shares.reduce((s, x) => s + x.share, 0);
    if (sumShares > 0) {
      shares.forEach(x => {
        x.share = x.share * (totalPacks / sumShares);
      });
    }

    // 2. алгоритм залишку для упаковок
    let fractionalShares = shares.map(x => ({ partner: x.partner, share: x.share }));
    let allocated = fractionalShares.map(x => ({
      partner: x.partner,
      packs: Math.floor(x.share)
    }));

    let allocatedSum = allocated.reduce((s, x) => s + x.packs, 0);
    let remainder = totalPacks - allocatedSum;

    fractionalShares
      .map((x, i) => ({ idx: i, frac: x.share - allocated[i].packs }))
      .sort((a, b) => b.frac - a.frac)
      .slice(0, remainder)
      .forEach(x => { allocated[x.idx].packs += 1; });

    // 3. запис у продукти
    allocated.forEach(x => {
      const prod = x.partner.products.find(pr => pr.product === plan.product);
      if (prod) {
        const planPacks = x.packs;
        const execPacks = prod.historyPacks?.[keyCurr] || 0;
        const toSellPacks = Math.max(planPacks - execPacks, 0);

        prod.planPacks   = planPacks;
        prod.execPacks   = execPacks;
        prod.toSellPacks = toSellPacks;

        const execMoney    = prod.historyMoney?.[keyCurr] || 0;
        const pricePerPack = totalPacks > 0 ? (totalMoney / totalPacks) : 0;
        const planMoney    = planPacks * pricePerPack;
        const toSellMoney  = Math.max(planMoney - execMoney, 0);

        prod.planMoney   = Math.round(planMoney);
        prod.execMoney   = execMoney;
        prod.toSellMoney = Math.round(toSellMoney);

        // узгоджені пакети
        prod.basePacks    = planPacks;
        prod.superPacks   = Math.round(planPacks * 1.20);
        prod.optimalPacks = Math.round(planPacks * 1.15);
        prod.satisfyPacks = Math.round(planPacks * 1.07);
        prod.thinkPacks   = planPacks;
        prod.goPacks      = planPacks;

        // узгоджені гроші
        prod.baseMoney    = planMoney;
        prod.superMoney   = Math.round(planMoney * 1.20);
        prod.optimalMoney = Math.round(planMoney * 1.15);
        prod.satisfyMoney = Math.round(planMoney * 1.07);
        prod.thinkMoney   = planMoney;
        prod.goMoney      = planMoney;

        prod.percentExecPacks = planPacks > 0 ? ((execPacks / planPacks) * 100).toFixed(2) + "%" : "0.00%";
        prod.percentExecMoney = planMoney > 0 ? ((execMoney / planMoney) * 100).toFixed(2) + "%" : "0.00%";
      }
    });

    // контрольний рядок
    const sumPlanPacks = allocated.reduce((s, x) => s + x.packs, 0);
    const sumPlanMoney = allocated.reduce((s, x) => {
      const pricePerPack = totalPacks > 0 ? (totalMoney / totalPacks) : 0;
      return s + x.packs * pricePerPack;
    }, 0);

    console.log(`▶ Контроль по продукту ${plan.product}:`);
    console.log(`   План з таблиці: ${totalPacks.toLocaleString("uk-UA")} упак. / ${totalMoney.toLocaleString("uk-UA")} грн`);
    console.log(`   Сума розподілу: ${sumPlanPacks.toLocaleString("uk-UA")} упак. / ${Math.round(sumPlanMoney).toLocaleString("uk-UA")} грн`);
  });

  /* 4. додаємо рядок "Всього" для кожного партнера
  partners.forEach(p => {
    let totalPlan = 0, totalExec = 0;
    p.products.forEach(prod => {
      totalPlan += prod.planMoney || 0;
      totalExec += prod.execMoney || 0;
    });
    let totalRow = p.products.find(pr => pr.product === "Всього");
    if (!totalRow) {
      totalRow = { product: "Всього" };
      p.products.push(totalRow);
    }
    totalRow.planMoney = totalPlan;
    totalRow.execMoney = totalExec;
  });*/

  return partners;
}

  html += "<table><tr><th>Назва</th><th>Товарообіг</th><th>MS%т</th><th>MSр%</th><th>Gross Rate</th><th>EI</th><th>ТТ</th><th>Тип клієнта</th></tr>";

  partners.forEach(p => {
   // приклад рядка в renderClassification
html += `<tr>
  <td>${p.name}</td>

function renderHistoryPlans(partners, quarter, historyType, selectedProducts = []) {
  let html = "<h3>Історія та плани</h3>";

  const allProducts = [...new Set(partners.flatMap(p => p.products.map(pr => pr.product)))];

html += `
  <table>
    <tr>
      <th>Партнер</th>
      <th id="productHeader" class="product-header">▶ Продукт
        <div id="productFilterContainer" class="product-filter">
          ${allProducts.map(prod => {
            const checked = selectedProducts.includes(prod) ? "checked" : "";
            return `
              <label class="filter-option">
                <input type="checkbox" value="${prod}" ${checked}>
                <span>${prod}</span>
              </label>
            `;
          }).join("")}
        </div>
      </th>
      <th>Історія</th>
      <th>План</th>
      <th>Виконано</th>
      <th>Допродати</th>
      <th>Дольовий</th>
      <th>Супер</th>
      <th>Подобається</th>
      <th>Задовільнить</th>
      <th>Замислитися</th>
      <th>Піти</th>
    </tr>
`;

  const keyPrev = `2025_${quarter.replace("Q","")}`;

  let totalHistory = 0, totalPlan = 0, totalExec = 0, totalToSell = 0;

  partners.forEach(p => {
    p.products
      .filter(prod => selectedProducts.length === 0 || selectedProducts.includes(prod.product))
      .forEach(prod => {
        const history = historyType === "money"
          ? Math.round(prod.historyMoney?.[keyPrev] || 0)
          : Math.round(prod.historyPacks?.[keyPrev] || 0);

        const plan = historyType === "money"
          ? Math.round(prod.planMoney || 0)
          : Math.round(prod.planPacks || 0);

        const exec = historyType === "money"
          ? Math.round(prod.execMoney || 0)
          : Math.round(prod.execPacks || 0);

        const toSell = historyType === "money"
          ? Math.round(prod.toSellMoney || 0)
          : Math.round(prod.toSellPacks || 0);

        const base = historyType === "money" ? Math.round(prod.baseMoney || 0) : Math.round(prod.basePacks || 0);
        const superV = historyType === "money" ? Math.round(prod.superMoney || 0) : Math.round(prod.superPacks || 0);
        const optimal = historyType === "money" ? Math.round(prod.optimalMoney || 0) : Math.round(prod.optimalPacks || 0);
        const satisfy = historyType === "money" ? Math.round(prod.satisfyMoney || 0) : Math.round(prod.satisfyPacks || 0);
        const think = historyType === "money" ? Math.round(prod.thinkMoney || 0) : Math.round(prod.thinkPacks || 0);
        const go = historyType === "money" ? Math.round(prod.goMoney || 0) : Math.round(prod.goPacks || 0);

        const growth = (val) => {
          if (!history || history === 0) return "";
          const perc = ((val - history) / history * 100).toFixed(0);
          return ` / ${perc > 0 ? "+" : ""}${perc}%`;
        };

        const ratio = plan > 0 ? Math.min(toSell / plan, 1) : 1;
        const hue = (1 - ratio) * 120;
        const bgColor = `hsl(${hue}, 70%, 45%)`;

        html += `<tr>
          <td>${p.name}</td>
          <td>${prod.product}</td>
          <td>${formatNumber(history)}</td>
          <td>${plan ? formatNumber(plan) : "-"}</td>
          <td>${exec ? formatNumber(exec) : "-"}</td>
          <td style="background-color:${bgColor};color:white;font-weight:bold;">${toSell ? formatNumber(toSell) : "-"}</td>
          <td>${base ? formatNumber(base) + growth(base) : "-"}</td>
          <td>${superV ? formatNumber(superV) + growth(superV) : "-"}</td>
          <td>${optimal ? formatNumber(optimal) + growth(optimal) : "-"}</td>
          <td>${satisfy ? formatNumber(satisfy) + growth(satisfy) : "-"}</td>
          <td>${think ? formatNumber(think) + growth(think) : "-"}</td>
          <td>${go ? formatNumber(go) + growth(go) : "-"}</td>
        </tr>`;

        totalHistory += history;
        totalPlan += plan;
        totalExec += exec;
        totalToSell += toSell;
      });
  });

  html += `<tr class="total-row" style="font-weight:bold;background:#000;">
    <td colspan="2">Сума</td>
    <td>${formatNumber(totalHistory)}</td>
    <td>${formatNumber(totalPlan)}</td>
    <td>${formatNumber(totalExec)}</td>
    <td>${formatNumber(totalToSell)}</td>
    <td colspan="6"></td>
  </tr>`;

  html += "</table>";
  document.getElementById("historyPlans").innerHTML = html;

  // відкриття/закриття випадаючого списку
  const header = document.getElementById("productHeader");
  const filterContainer = document.getElementById("productFilterContainer");

  header.addEventListener("click", (e) => {
    e.stopPropagation();
    filterContainer.style.display = filterContainer.style.display === "none" ? "block" : "none";
  });

  // закриття при кліку поза списком
  document.addEventListener("click", () => {
    if (filterContainer.style.display === "block") {
      const selected = Array.from(document.querySelectorAll("#productFilterContainer input[type=checkbox]:checked"))
                            .map(o => o.value);
      filterContainer.style.display = "none";
      renderHistoryPlans(partners, quarter, historyType, selected);
    }
  });

  // щоб клік всередині списку не закривав його
  filterContainer.addEventListener("click", (e) => {
    e.stopPropagation();
  });
}

let planChartInstance;

function renderPlanChart(planRows, partners, quarter, userKey) {
  const ids = userMap[userKey] || [];
  const execKey1 = `2026_${quarter.replace("Q","")}`;
  const execKey2 = `2026_Q${quarter.replace("Q","")}`;
  const planKey1 = `2026_${quarter.replace("Q","")}`;
  const planKey2 = `2026_Q${quarter.replace("Q","")}`;

  const labels = [];
  const dataPercent = [];
  const dataMoney = [];
  const dataPacks = [];

  planRows.forEach(row => {
    const planMoney = row.planMoney?.[planKey1] || row.planMoney?.[planKey2] || 0;
    const planPacks = row.planPacks?.[planKey1] || row.planPacks?.[planKey2] || 0;

    let execMoney = 0;
    let execPacks = 0;

    partners.forEach(p => {
      if (!ids.includes(p.id)) return;
      if (!Array.isArray(p.products)) return;

      p.products.forEach(prod => {
        if (prod.product === row.product) {
          execMoney += prod.historyMoney?.[execKey1] || prod.historyMoney?.[execKey2] || 0;
          execPacks += prod.historyPacks?.[execKey1] || prod.historyPacks?.[execKey2] || 0;
        }
      });
    });

    if (planMoney > 0) {
      labels.push(row.product);
      const percent = planMoney > 0 ? (execMoney / planMoney) * 100 : 0;
      dataPercent.push(Number(percent.toFixed(2)));
      dataMoney.push(Math.round(execMoney));
      dataPacks.push(Math.round(execPacks));
    }
  });

  const ctx = document.getElementById("planChart").getContext("2d");

  if (planChartInstance) {
    planChartInstance.destroy();
  }

  planChartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        {
          label: "% виконання",
          data: dataPercent,
          yAxisID: "yPercent",
          backgroundColor: function(ctx) {
            const val = Number(ctx.raw);
            if (val <= 10) return "red";
            if (val <= 20) return "orange";
            if (val <= 30) return "gold";
            if (val <= 40) return "yellowgreen";
            if (val <= 50) return "green";
            if (val <= 60) return "lime";
            if (val <= 70) return "mediumseagreen";
            if (val <= 80) return "turquoise";
            if (val <= 90) return "cyan";
            if (val <= 100) return "blue";
            return "lightblue";
          },
          borderColor: "white",
          borderWidth: 1
        },
        {
          label: "Виконано (грн)",
          data: dataMoney,
          yAxisID: "yAbs",
          backgroundColor: "rgba(255, 215, 0, 1)"
        },
        {
          label: "Виконано (упаковки)",
          data: dataPacks,
          yAxisID: "yAbs",
          backgroundColor: "rgba(135, 206, 250, 1)"
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: {
            color: "white",
            font: { weight: "bold" }
          }
        },
        title: {
          display: true,
          text: "% виконання та абсолютні значення",
          color: "white",
          font: { weight: "bold", size: 16 }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const dsLabel = context.dataset.label || "";
              const value = context.raw;
              if (context.dataset.yAxisID === "yPercent") {
                return `${dsLabel}: ${Number(value).toFixed(2)}%`;
              } else {
                return `${dsLabel}: ${Number(value).toLocaleString("uk-UA")}`;
              }
            }
          }
        }
      },
      scales: {
        yPercent: {
          type: "linear",
          position: "left",
          beginAtZero: true,
          max: 120,
          ticks: {
            color: "white",
            font: { weight: "bold" },
            callback: v => `${v}%`
          },
          grid: {
            color: function(ctx) {
              const val = ctx.tick.value;
              if (val === 10) return "red";
              if (val === 20) return "orange";
              if (val === 30) return "gold";
              if (val === 40) return "yellowgreen";
              if (val === 50) return "green";
              if (val === 60) return "lime";
              if (val === 70) return "mediumseagreen";
              if (val === 80) return "turquoise";
              if (val === 90) return "cyan";
              if (val === 100) return "blue";
              if (val === 120) return "lightblue";
              return "rgba(255,255,255,0.1)";
            }
          }
        },
        yAbs: {
          type: "linear",
          position: "right",
          beginAtZero: true,
          ticks: {
            color: "white",
            font: { weight: "bold" },
            callback: v => Number(v).toLocaleString("uk-UA")
          },
          grid: { drawOnChartArea: false }
        }
      }
    }
  });
}

function getColorForToSell(toSell, plan) {
  const t = Number(toSell) || 0;
  const p = Number(plan) || 0;
  if (p <= 0) return "gray";
  const ratio = Math.min(t / p, 1);
  const hue = (1 - ratio) * 120;
  return `hsl(${hue}, 70%, 45%)`;
}

function renderTable(partners) {
  const table = document.getElementById("planTableBody");
  table.innerHTML = "";

  partners.forEach(p => {
    p.products.forEach(prod => {
      const row = document.createElement("tr");

      const planCell = document.createElement("td");
      planCell.textContent = prod.planPacks ? formatNumber(prod.planPacks) : "0";
      row.appendChild(planCell);

      const execCell = document.createElement("td");
      execCell.textContent = prod.execPacks ? formatNumber(prod.execPacks) : "0";
      row.appendChild(execCell);

      const toSellCell = document.createElement("td");
      const toSellVal = Number(prod.toSellPacks) || 0;
      const planVal = Number(prod.planPacks) || 0;
      toSellCell.textContent = toSellVal ? formatNumber(toSellVal) : "0";
      toSellCell.classList.add("to-sell");
      toSellCell.style.backgroundColor = getColorForToSell(toSellVal, planVal);
      row.appendChild(toSellCell);

      table.appendChild(row);
    });
  });
}

  }

    alert("Невірний ID партнера");
    return;
  }

  const storedPartners = JSON.parse(localStorage.getItem("partners")) || [];

      tt: d.tt || 0,

    };

  const totalUserTurnover = allPartners.reduce((sum, p) => sum + (p.turnover || 0), 0);
allPartners.forEach(p => {

});
