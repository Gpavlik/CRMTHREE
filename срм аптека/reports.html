/* базові стилі таблиці */
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
  overflow-x: auto;
  display: block;
}

th, td {
  border: 1px solid #7a7a7a;

}

th {

.filters {

}

label {

input, select {

button:hover { background-color: #25a525; }

/* 📱 Телефони (до 480px) */
@media (max-width: 480px) {
  h3 { font-size: 1.2rem; }
  p { font-size: 0.9rem; }
  table { font-size: 0.75rem; }
  th, td { padding: 4px; }

  }
  .buttons { grid-template-columns: 1fr; }
}

/* 📲 Планшети (481px–768px) */
@media (min-width: 481px) and (max-width: 768px) {
  h3 { font-size: 1.4rem; }
  p { font-size: 1rem; }
  table { font-size: 0.85rem; }

// ініціалізація партнерів
function initPartners(userKey) {
  const partners = JSON.parse(localStorage.getItem("partners")) || [];
  const ids = userMap[userKey] || [];

  // Перевіряємо типи: приводимо все до рядка
  const filtered = (userKey === "admin") 
    ? partners 
    : partners.filter(p => ids.map(String).includes(String(p.id)));

  const partnerSelect = $("#partnerSelect");
  partnerSelect.empty();
  filtered.forEach(p => {
    partnerSelect.append(new Option(p.name, p.name));
  });

  // Якщо Select2 вже ініціалізований — просто оновлюємо
  if (partnerSelect.hasClass("select2-hidden-accessible")) {
    partnerSelect.trigger("change");
  } else {
    partnerSelect.select2({
      placeholder: "Оберіть партнера",
      allowClear: true,
      width: '300px'
    });
  }

  partnerSelect.on("change", function() {
    selectedPartnerName = $(this).val() || [];
  });
}

    placeholder: "Оберіть продукт",

  });
}
let currentType = ""; // глобально зберігаємо тип звіту

function normalizeDate(d) {
  // ISO формат YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;

  // Український формат DD.MM.YYYY
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(d)) {
    const [day, month, year] = d.split(".");
    return `${year}-${month}-${day}`;
  }

  return d; // fallback
}

async function loadReport(type) {
  currentType = type;

  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;

  let userKey = currentUser;
  let selectedUserKey = null;
  if (userKey === "admin") {
    selectedUserKey = document.getElementById("userName").value;
  }

  // читаємо дані з кешу
  let data = JSON.parse(localStorage.getItem(type + "Cache")) || [];

  // 🔎 Фільтрація для всіх типів (крім contacts)
  if (type !== "contacts") {
    data = data.filter(row => {
      let matchUser = true;
      if (userKey === "admin" && selectedUserKey) {
        matchUser = row.userName === userNames[selectedUserKey];
      } else {
        matchUser = row.userName === userNames[userKey];
      }

      let matchDate = true;
      const d = normalizeDate(row.date);
      if (startDate) matchDate = matchDate && d >= startDate;
      if (endDate) matchDate = matchDate && d <= endDate;

      const matchPartner = selectedPartnerName.length
        ? selectedPartnerName.includes(row.partnerName)
        : true;

      const matchProduct = selectedProductName.length
        ? selectedProductName.includes(row.product)
        : true;

      return matchUser && matchDate && matchPartner && matchProduct;
    });
    // 🆕 застосовуємо дедуплікацію
    data = deduplicateVisits(data);
  }

  // перед рендером ховаємо всі додаткові фільтри
  document.getElementById("filters").style.display = "none";
  document.getElementById("partnerFilter").style.display = "none";

   if (type === "contacts") {
    renderContactsReport();
  } else if (type === "calendar") {
  const data = JSON.parse(localStorage.getItem("calendarCache")) || [];
  renderCalendarReport(data);
  } else if (type === "pharmacy") {
    renderPharmacyReport(data);
    document.getElementById("partnerFilter").style.display = "flex";
  } else if (type === "partner") {
    renderPartnerReport(data);
    document.getElementById("partnerFilter").style.display = "flex";
  } else if (type === "doctor") {
    renderDoctorVisitsReport(data);
    populateFilters(data);
    document.getElementById("filters").style.display = "block"; // показуємо селекти лікарів
  } else {
    renderDefaultTable(data);
  }

  window.lastReportData = data;
}

function deduplicateVisits(data) {
  const grouped = {};

  data.forEach(row => {
    // ключ: дата + ідентифікатор (партнер/лікар/аптека)
    const key = `${row.date}_${row.partnerName || row.doctor || row.pharmacy}`;

    if (!grouped[key]) {
      grouped[key] = row;
    } else {
      // залишаємо той, що пізніше за часом
      const existingTime = grouped[key].time || "00:00";
      const newTime = row.time || "00:00";
      if (newTime > existingTime) {
        grouped[key] = row;
      }
    }
  });

  return Object.values(grouped);
}

  initPartners(currentUser);

  // ховаємо селекти лікарів
  document.getElementById("filters").style.display = "none";
  document.getElementById("cityFilter").innerHTML = "<option value=''>Всі</option>";
  document.getElementById("lpzFilter").innerHTML = "<option value=''>Всі</option>";
  document.getElementById("specialtyFilter").innerHTML = "<option value=''>Всі</option>";

  document.getElementById("partnerFilter").style.display = "none";

  document.getElementById("report").innerHTML = "<p>Фільтри скинуто. Оберіть нові параметри.</p>";
}

    (v.products || []).forEach(p => {

function renderPartnerReport(data) {

    (v.products || []).forEach(p => {
      const hasData = Object.values(p).some(val => val && val !== "");

          <td>${p.exclusive || "-"}</td>
          <td>${p.conditions || "-"}</td>

      }
    });
    html += "</table><hr/>";
  });
  document.getElementById("report").innerHTML = html;

}

function formatExpiry(expiry) {
  if (!expiry) return "-";
  try {
    const d = new Date(expiry);
    // повертаємо тільки місяць та рік
    const month = d.toLocaleString("uk-UA", { month: "long" });
    const year = d.getFullYear();
    return `${month} ${year}`;
  } catch {
    return expiry; // якщо не вдалося розпарсити, показуємо як є
  }
}
function renderDoctorVisitsReport(data) {
  const grouped = {};
  data.forEach(row => {
    const key = `${row.userName}_${row.date}_${row.time}_${row.doctor}`;
    if (!grouped[key]) {
      grouped[key] = {
        userName: row.userName,
        date: row.date,
        time: row.time,
        region: row.region,
        city: row.city,
        lpz: row.lpz,
        specialty: row.specialty,
        doctor: row.doctor,
        products: []
      };
    }

    grouped[key].products.push({
      product: row.product,
      agreement: row.agreement,
      competitors: row.competitors,
      //presentationShown: row.presentationShown,
      //slides: row.slides
    });
  });

  let html = "";
  Object.values(grouped).forEach(v => {
    html += `
      <h3>${v.userName} — ${v.date} ${v.time}</h3>
      <p>Лікар: ${v.doctor} (${v.specialty})</p>
      <p>ЛПЗ: ${v.lpz}, ${v.city}, ${v.region}</p>
      <table>
        <tr>
          <th>Продукт</th>
          <th>Домовленість</th>
          <th>Конкуренти</th>
          <!--<th>Презентація</th>-->
          <!--<th>Слайди</th>-->
        </tr>
    `;
    v.products.forEach(p => {
      html += `<tr>
        <td>${p.product || "-"}</td>
        <td>${p.agreement || "-"}</td>
        <td>${p.competitors || "-"}</td>
        <!--<td>${p.presentationShown || "-"}</td>-->
        <!--<td>${p.slides || "-"}</td>-->
      </tr>`;
    });
    html += "</table><hr/>";
  });

  document.getElementById("report").innerHTML = html;
  window.lastReportData = data;
}
function populateFilters(data) {
  const citySelect = document.getElementById("cityFilter");
  const lpzSelect = document.getElementById("lpzFilter");
  const specialtySelect = document.getElementById("specialtyFilter");

  // очищаємо
  citySelect.innerHTML = "<option value=''>Всі</option>";
  lpzSelect.innerHTML = "<option value=''>Всі</option>";
  specialtySelect.innerHTML = "<option value=''>Всі</option>";

  const cities = [...new Set(data.map(r => r.city).filter(Boolean))];
  cities.forEach(c => citySelect.innerHTML += `<option value="${c}">${c}</option>`);

  // каскадність
  citySelect.onchange = () => {
    const filteredLpzs = [...new Set(data.filter(r => !citySelect.value || r.city === citySelect.value).map(r => r.lpz).filter(Boolean))];
    lpzSelect.innerHTML = "<option value=''>Всі</option>";
    filteredLpzs.forEach(l => lpzSelect.innerHTML += `<option value="${l}">${l}</option>`);
    specialtySelect.innerHTML = "<option value=''>Всі</option>";
  };

  lpzSelect.onchange = () => {
    const filteredSpecs = [...new Set(data.filter(r => (!citySelect.value || r.city === citySelect.value) && (!lpzSelect.value || r.lpz === lpzSelect.value)).map(r => r.specialty).filter(Boolean))];
    specialtySelect.innerHTML = "<option value=''>Всі</option>";
    filteredSpecs.forEach(s => specialtySelect.innerHTML += `<option value="${s}">${s}</option>`);
  };
}


function applyFilters(data) {
  const city = document.getElementById("cityFilter").value;
  const lpz = document.getElementById("lpzFilter").value;
  const specialty = document.getElementById("specialtyFilter").value;

  return data.filter(r =>
    (!city || r.city === city) &&
    (!lpz || r.lpz === lpz) &&
    (!specialty || r.specialty === specialty)
  );
}
function renderContactsReport() {
  const pharmacies = JSON.parse(localStorage.getItem("pharmacyCache")) || [];
  const partners = JSON.parse(localStorage.getItem("partnerCache")) || [];

  let userKey = currentUser;
  let selectedUserKey = null;
  if (userKey === "admin") {
    selectedUserKey = document.getElementById("userName").value;
  }

  // об’єднуємо всі візити
  let allContacts = [...pharmacies, ...partners];

  // фільтрація по користувачу
  allContacts = allContacts.filter(v => {
    if (userKey === "admin" && selectedUserKey) {
      return v.userName === userNames[selectedUserKey];
    } else {
      return v.userName === userNames[userKey];
    }
  });

  if (!allContacts.length) {
    document.getElementById("report").innerHTML = "<p>Немає даних</p>";
    return;
  }

  let html = "<table>";
  html += "<tr><th>Користувач</th><th>Партнер/Аптека</th><th>Місто</th><th>Адреса</th><th>Контакт</th></tr>";

  allContacts.forEach(v => {
    html += `<tr>
      <td>${v.userName}</td>
      <td>${v.partnerName || "-"}</td>
      <td>${v.city || "-"}</td>
      <td>${v.address || "-"}</td>
      <td>${v.contactName || "-"} (${v.contactPhone || "-"})</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("report").innerHTML = html;
  window.lastReportData = allContacts;
}




// дефолтна таблиця
function renderDefaultTable(data) {
  let html = "<table><tr>";
  Object.keys(data[0]).forEach(key => html += "<th>" + key + "</th>");
  html += "</tr>";
  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(val => html += "<td>" + val + "</td>");
    html += "</tr>";
  });
  html += "</table>";
  document.getElementById("report").innerHTML = html;
}

async function preloadCalendarVisits() {
  try {
    const url = "https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec?type=calendar";
    const res = await fetch(url);
    const raw = await res.text();
    const data = JSON.parse(raw);

    localStorage.setItem("calendarCache", JSON.stringify(data));
    console.log("✅ Календарні візити закешовано:", data.length);
  } catch (err) {
    console.error("❌ Помилка при завантаженні календарних візитів:", err);
  }
}
function renderCalendarReport(data) {
  if (!data || !data.length) {
    document.getElementById("report").innerHTML = "<p>Немає даних календаря</p>";
    return;
  }

  let html = "<table>";
  html += "<tr><th>Користувач</th><th>Дата</th><th>Час</th><th>Партнер/ЛПЗ</th><th>Місто</th><th>Адреса</th><th>Коментар</th></tr>";

  data.forEach(v => {
    html += `<tr>
      <td>${v.userName || "-"}</td>
      <td>${v.date || "-"}</td>
      <td>${v.time || "-"}</td>
      <td>${v.partnerName || v.lpz || "-"}</td>
      <td>${v.city || "-"}</td>
      <td>${v.address || "-"}</td>
      <td>${v.comment || "-"}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("report").innerHTML = html;
  window.lastReportData = data;
}


function exportToExcel() {
  const data = window.lastReportData || [];
  if (!data.length) {
    alert("Немає даних для експорту");
    return;
  }

  // створюємо нову книгу
  const wb = XLSX.utils.book_new();

  // перетворюємо масив об’єктів у аркуш
  const ws = XLSX.utils.json_to_sheet(data);

  // додаємо аркуш у книгу
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  // генеруємо файл .xlsx
  XLSX.writeFile(wb, "report.xlsx");
}
