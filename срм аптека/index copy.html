<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Калькулятор плану</title>
  <style>
     body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #006400, #004d00);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #7a7a7a; padding: 6px; text-align: center; }
    th { background: #adadad; }
    td.name { text-align: left; }
    .vital { background-color: #26a12b; }
    .valuable { background-color: #286ca3; }
    .acceptable { background-color: #e0d037; }
    .interfering { background-color: #c78a90; }
    input {
      width: 200px; padding: 10px; margin: 0 auto 15px auto;
      border: none; border-radius: 6px; font-size: 1rem;
    }
    select {
      width: 200px; padding: 10px; margin: 0 auto 15px auto;
      border: none; border-radius: 6px; font-size: 1rem;
    }
    button {
      width: 200px; padding: 12px; margin-top: 10px;
      background-color: #004d00; color: #ffffff;
      border: solid 1px #c2ffc2; border-radius: 6px; font-size: 1rem;
      cursor: pointer; transition: background 0.3s ease;
    }
     h3 { margin-top: 30px; text-align: center; }
    button:hover { background-color: #003300; }
  </style>
</head>
<body>
  <h1>Калькулятор розподілу плану</h1>
<br><br>
  <img src="./logo.svg" alt="logo" width="560">
  <h3>Оберіть користувача:</h3>
  <select id="userSelect">
    <option value="fedir">Олександр</option>
    <option value="olena">Тетяна</option>
    <option value="office">Офіс</option>
     </select>

  <h3>Введіть план по продукту:</h3>
  <input type="number" id="planInput" value="" placeholder="Введіть план"  />

  <button id="calcBtn">Розрахувати</button>
  <div id="output"></div>

<script>
 let allPartners = [];
  let historyData = {}; // тут будемо зберігати історію по партнерах

// Мапа користувачів -> їхні партнери
const userMap = {
  fedir: [9,798,31,15,41,26,32,66,47,17,121,61,52,76,29,22,94,23,16,55],
  olena: [11,53,45,146,181,27,601,108,10],
  office: [1,2,3,4,5,6]
  };

async function showPartnerList(sheetUrl) {
  const res = await fetch(`${sheetUrl}/gviz/tq?tqx=out:json&sheet=список`);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  let html = `<h3>Список партнерів з таблиці</h3>
  <table border="1">
    <tr><th>№</th><th>Партнер</th></tr>`;

  json.table.rows.forEach(r => {
    const id = r.c[1]?.v || "";
    const name = r.c[2]?.v || "";
    html += `<tr><td>${id}</td><td>${name}</td></tr>`;
  });

  html += "</table>";
  document.getElementById("output").innerHTML = html;
}

async function getPartnerNameFromMorion(partnerId, morionUrl) {
  const res = await fetch(`${morionUrl}/gviz/tq?tqx=out:json&sheet=sheet1`);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  const row = json.table.rows.find(r => String(r.c[1]?.v) === String(partnerId));
  return row?.c[2]?.v || `Партнер ${partnerId}`;
}

async function fetchHistory(partnerId, historyUrl, morionUrl) {
  // 1. Назва партнера з Моріону
  const partnerName = await getPartnerNameFromMorion(partnerId, morionUrl);

  // 2. Дані з аркуша‑ID в таблиці історій
  const res2 = await fetch(
    `${historyUrl}/gviz/tq?tqx=out:json&range='${partnerId}'!A1:Z1000`
  );
  const text2 = await res2.text();
  const json2 = JSON.parse(text2.substr(47).slice(0, -2));
  const rows = json2.table.rows.map(r => r.c.map(c => c?.v || ""));

  let products = [];
  let mode = "money";
  let firstProduct = null;

  rows.forEach(r => {
    const product = r[2];
    const q1 = r[3], q2 = r[4], q3 = r[5], q4 = r[6];

    if (product && (q1 || q2 || q3 || q4)) {
      if (!firstProduct && mode === "money") {
        firstProduct = product;
      }
      if (firstProduct && product === firstProduct && mode === "money") {
        mode = "packs";
      }

      let prod = products.find(p => p.product === product);
      if (!prod) {
        prod = { partnerId, product };
        products.push(prod);
      }

      if (mode === "money") {
        prod.historyMoney = { Q1: +q1 || 0, Q2: +q2 || 0, Q3: +q3 || 0, Q4: +q4 || 0 };
      } else {
        prod.historyPacks = { Q1: +q1 || 0, Q2: +q2 || 0, Q3: +q3 || 0, Q4: +q4 || 0 };
      }
    }
  });

  return { partnerName, products };
}
(async () => {
  const morionUrl = "https://docs.google.com/spreadsheets/d/1CUEcXgBAUIKvg0k2JePbhSH-_S01HcEi";
  const historyUrl = "https://docs.google.com/spreadsheets/d/1OhWc6BKpVML_dnxDVTvLsr6GyRfM27BZ";

  const partnerId = 9; // приклад
  const { partnerName, products } = await fetchHistory(partnerId, historyUrl, morionUrl);

  let html = `<h3>Історія продажів партнера ${partnerId} — ${partnerName}</h3>
  <table border="1" cellspacing="0" cellpadding="5">
    <tr>
      <th>Продукт</th>
      <th>Q1 (грн)</th><th>Q2 (грн)</th><th>Q3 (грн)</th><th>Q4 (грн)</th>
      <th>Q1 (упак.)</th><th>Q2 (упак.)</th><th>Q3 (упак.)</th><th>Q4 (упак.)</th>
    </tr>`;

  products.forEach(p => {
    html += `<tr>
      <td>${p.product}</td>
      <td>${p.historyMoney?.Q1 || 0}</td>
      <td>${p.historyMoney?.Q2 || 0}</td>
      <td>${p.historyMoney?.Q3 || 0}</td>
      <td>${p.historyMoney?.Q4 || 0}</td>
      <td>${p.historyPacks?.Q1 || 0}</td>
      <td>${p.historyPacks?.Q2 || 0}</td>
      <td>${p.historyPacks?.Q3 || 0}</td>
      <td>${p.historyPacks?.Q4 || 0}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("output").innerHTML = html;
})();

// Тягнемо дані з Google Sheets
async function fetchPartners() {
  const url = "https://docs.google.com/spreadsheets/d/1CUEcXgBAUIKvg0k2JePbhSH-_S01HcEi/gviz/tq?tqx=out:json&sheet=sheet1";
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  return json.table.rows
    .map(r => {
      let grossRaw = r.c[3]?.v;
      let grossRate = parseFloat(grossRaw);
      if (isNaN(grossRate)) grossRate = 0;
      grossRate = grossRate * 100;
      return {
        name: r.c[0]?.v || "",
        turnover: parseFloat(r.c[1]?.v) || 0,
        msTable: parseFloat(r.c[2]?.v) || 0,
        grossRate: grossRate,
        ei: parseFloat(r.c[4]?.v) || 0,
        tt: parseInt(r.c[5]?.v) || 0
      };
    })
    .filter(p => p.name && !p.name.includes("Rating"));
}

// Класифікація по квадрантах (Y = історія, X = MSр%)
function classifyPartner(p, allPartners) {
  const avgHistory = allPartners.reduce((s,x)=>s+(x.history||0),0) / allPartners.length;
  const avgMsr = allPartners.reduce((s,x)=>s+(x.msr||0),0) / allPartners.length;

  const highHistory = p.history >= avgHistory;
  const highMsr = p.msr >= avgMsr;

  if (highHistory && highMsr) return {type:"Життєво важливий", cls:"vital"};
  if (!highHistory && highMsr) return {type:"Цінний", cls:"valuable"};
  if (highHistory && !highMsr) return {type:"Прийнятний", cls:"acceptable"};
  return {type:"Заважаючий", cls:"interfering"};
}

// Формула планів і пакетів
function formatPlan(value, history) {
  const roundedValue = Math.ceil(value); // округлення у більшу сторону
  const delta = history > 0 ? Math.ceil(((value - history) / history * 100)) : 0;
  const sign = delta >= 0 ? "+" : "";
  return `${roundedValue} / ${sign}${delta}%`;
}


// Формула планів і пакетів
function distributePlan(planTotal, partners, allPartners) {
  const sumHistory = partners.reduce((s,p)=>s+p.history,0);

  const avgEi = allPartners.reduce((s,p)=>s+p.ei,0) / allPartners.length;
  const avgGross = allPartners.reduce((s,p)=>s+p.grossRate,0) / allPartners.length;
  const avgTt = allPartners.reduce((s,p)=>s+p.tt,0) / allPartners.length;
  const avgPotential = allPartners.reduce((s,p)=>{
    return s + (p.turnover > 0 ? (1 - p.history/p.turnover) : 0);
  },0) / allPartners.length;



function adjustWeightByType(p) {
  switch(p.type) {
    case "Життєво важливий": return 1.4   // підсилюємо
    case "Цінний": return 0.7;             // залишаємо як є
    case "Прийнятний": return 1.3;         // трохи зменшуємо
    case "Заважаючий": return 0.3;         // сильно зменшуємо
    default: return 1.0;
  }
}



  partners.forEach(p => {
  const potential = p.turnover > 0 ? (1 - p.history/p.turnover) : 0;
  p.potential = potential;

  let baseWeight = (avgEi ? p.ei/avgEi : 0)*0.5 +
                   (avgGross ? p.grossRate/avgGross : 0)*0.3 +
                   (avgTt ? p.tt/avgTt : 0)*0.0 +
                   (avgPotential ? potential/avgPotential : 0)*0.2;

  p.weight = baseWeight * adjustWeightByType(p);
});
  const sumWeights = partners.reduce((s,p)=>s+p.weight,0);
  const gap = planTotal - sumHistory;

  
partners.forEach(p => {
  p.plan = p.history + gap * (p.weight/sumWeights);
  p.base = formatPlan(p.plan, p.history);

  // пакети рахуються як фіксовані надбавки до дольового
  p.super = formatPlan(p.plan + 20, p.history);
  p.optimal = formatPlan(p.plan + 15, p.history);
  p.satisfy = formatPlan(p.plan + 7, p.history);
  p.think = formatPlan(p.plan, p.history);
  p.go = formatPlan(p.plan, p.history);
});
  return partners;
}
document.getElementById("calcBtn").addEventListener("click", async () => {
  const plan = parseFloat(document.getElementById("planInput").value);
  const user = document.getElementById("userSelect").value;
  const partnersIds = userMap[user];
  const partnerData = await fetchPartners();

  const sheetUrl = "https://docs.google.com/spreadsheets/d/1OhWc6BKpVML_dnxDVTvLsr6GyRfM27BZ";

  // підтягнути історію для кожного партнера
  for (let id of partnersIds) {
    const history = await fetchHistory(id, sheetUrl);
    historyData[id] = history;
  }

  const totalTurnover = partnersIds.reduce((sum,id)=> sum + (partnerData[id-1]?.turnover || 0), 0);

  allPartners = partnersIds.map(id => {
    const d = partnerData[id-1];
    const history = historyData[id] || [];

    // приклад: беремо суму всіх продуктів за Q1 у грошах
    const historyQ1 = history.reduce((s,p)=> s + (p.historyMoney?.Q1 || 0), 0);

    return {
      id,
      name: d.name,
      turnover: d.turnover,
      msTable: d.msTable,
      grossRate: d.grossRate,
      ei: d.ei,
      tt: d.tt,
      history: historyQ1,
      msr: totalTurnover > 0 ? (d.turnover / totalTurnover * 100) : 0,
      network: d.network || "-",
      product: d.product || "-"
    };
  });

  // класифікація
  allPartners.forEach(p => {
    const {type, cls} = classifyPartner(p, allPartners);
    p.type = type;
    p.cls = cls;
  });

  

  // розподіл плану
  const rawData = distributePlan(plan, allPartners, allPartners);

  // відображення таблиці
  let html = "<table><tr><th>Назва партнера</th><th>Товарообіг</th><th>MS%т</th><th>MSр%</th><th>Gross Rate</th><th>EI</th><th>ТТ</th><th>Історія Q1 (грн)</th><th>Тип клієнта</th><th>Дольовий</th><th>Супер</th><th>Оптимальний</th><th>Задовільнить</th><th>Подумати</th><th>Піти</th></tr>";

  rawData.forEach(p => {
    html += `<tr>
      <td class="name">${p.name}</td>
      <td>${p.turnover.toFixed(2)}</td>
      <td>${p.msTable.toFixed(2)}%</td>
      <td>${p.msr.toFixed(2)}%</td>
      <td>${p.grossRate.toFixed(2)}%</td>
      <td>${Math.round(p.ei)}</td>
      <td>${p.tt}</td>
      <td>${p.history}</td>
      <td class="${p.cls}">${p.type}</td>
      <td>${p.base}</td>
      <td>${p.super}</td>
      <td>${p.optimal}</td>
      <td>${p.satisfy}</td>
      <td>${p.think}</td>
      <td>${p.go}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("output").innerHTML = html;
});

</script>
</body>
</html>
