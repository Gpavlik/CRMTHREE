// універсальна функція отримання партнерів з Google Sheets
async function fetchPartners(sheetId) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=sheet1`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));

    return json.table.rows.map(r => {
      const corpRaw = r.c[0]?.v || "";
      const idMatch = corpRaw.match(/^(\d+)/);
      const id = idMatch ? parseInt(idMatch[1], 10) : 0;
      const name = corpRaw.replace(/^(\d+)\.\s*/, "");
      return { id, name };
    }).filter(p => p.id && p.name);
  } catch (err) {
    console.error("Помилка отримання партнерів:", err);
    return [];
  }
}

async function initPartners(user) {
  const sheetId = "1CUEcXgBAUIKvg0k2JePbhSH-_S01HcEi"; // твій ID таблиці
  const partners = await fetchPartners(sheetId);

  console.log("▶ Отримано партнерів:", partners);

  localStorage.setItem("partners", JSON.stringify(partners));

  const ids = userMap[user] || [];
  let filtered = partners.filter(p => ids.includes(p.id));

  // якщо нічого не знайшли — показати всіх

  }

  filtered.forEach(p => {
    partnerSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });

// завжди додаємо «Лікар»

}

function normalizeDate(dateStr, timeStr) {
  if (!dateStr || !timeStr) return null;
  const date = new Date(dateStr + "T" + timeStr);
  return isNaN(date.getTime()) ? null : date;
}

function showConfirmModal(message, onYes, onNo) {
  const modal = document.getElementById('confirmModal');
  document.getElementById('confirmTitle').innerText = message;
  modal.style.display = 'block';

  const yesBtn = document.getElementById('confirmYes');
  const noBtn = document.getElementById('confirmNo');

  yesBtn.onclick = () => {
    modal.style.display = 'none';
    if (onYes) onYes();
  };
  noBtn.onclick = () => {
    modal.style.display = 'none';
    if (onNo) onNo();
  };
}

function styleEvent(info) {
  const status = info.event.extendedProps.status || info.event.title.split(":")[0];
  if (status.includes("Заплановано")) info.el.style.backgroundColor = "#FFD700";
  else if (status.includes("Перенесено")) info.el.style.backgroundColor = "#1E90FF";
  else if (status.includes("Відмінено")) info.el.style.backgroundColor = "#DC143C";
  else if (status.includes("Виконано")) info.el.style.backgroundColor = "#32CD32";

  const comment = info.event.extendedProps.comment || "";
  info.el.setAttribute("title", `${info.event.extendedProps.partnerName}\n${comment}`);

  // зберігаємо посилання на елемент
  info.event.setExtendedProp('elRef', info.el);
}

function updateLocalStorageStatus(visitId, newStatus) {
  const visits = JSON.parse(localStorage.getItem("visits")) || [];
  const updated = visits.map(v => {
    if (v.visitId == visitId) {
      return { ...v, status: newStatus };
    }
    return v;
  });
  localStorage.setItem("visits", JSON.stringify(updated));
}


// Допоміжна функція для перевірки часу
function isValidSlot(timeStr) {
  const allowed = [];
  for (let h = 8; h <= 18; h++) {
    allowed.push(`${String(h).padStart(2,"0")}:00`);
    if (h !== 18) allowed.push(`${String(h).padStart(2,"0")}:30`);
  }
  return allowed.includes(timeStr);
}

function padTime(timeStr) {
  const [h, m] = timeStr.split(":");
  return `${h.padStart(2,"0")}:${m}`;
}

function filterVisits() {
  const selectedPartner = document.getElementById("partnerSelect").value;
  const selectedStatus = document.getElementById("statusFilter").value;
  const allVisits = JSON.parse(localStorage.getItem("visits")) || [];

  // очищаємо календар
  calendar.getEvents().forEach(e => e.remove());

  // фільтруємо
  const filtered = allVisits.filter(v => {
    const partnerMatch = (selectedPartner === "all" || v.partnerName === selectedPartner);
    const statusMatch = (selectedStatus === "all" || v.status === selectedStatus);
    return partnerMatch && statusMatch;
  });

  // додаємо у календар
  filtered.forEach(v => {
    const startDateTime = new Date(`${v.date}T${padTime(v.time)}`);
    if (isNaN(startDateTime.getTime())) {
      console.warn("Некоректна дата/час:", v);
      return;
    }

    const endDateTime = new Date(startDateTime);
    endDateTime.setMinutes(endDateTime.getMinutes() + 30);

    calendar.addEvent({
      id: v.visitId,
      title: `${v.status}: ${v.partnerName}`,
      start: startDateTime,
      end: endDateTime,
      extendedProps: v
    });
  });
}

async function updateDateInBackend(event, newDate, newTime) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const chosenDate = new Date(newDate);
  chosenDate.setHours(0,0,0,0);

  // 2. Не можна перенести у минуле
  if (chosenDate < today) {
    alert("Не можна перенести візит у минуле");
    return;
  }

  // 5. Перевірка часу на слот
  if (!isValidSlot(newTime)) {
    alert("Час має бути між 08:00 і 18:30 з кроком 30 хв");
    return;
  }

  const newStart = `${newDate}T${newTime}`;
  const newEnd = new Date(newStart);
  newEnd.setMinutes(newEnd.getMinutes() + 30);

  // локально
  event.setStart(newStart);
  event.setEnd(newEnd.toISOString());
  event.setExtendedProp('status', 'Перенесено');
  event.setProp('title', `Перенесено: ${event.extendedProps.partnerName}`);

  const el = event.extendedProps.elRef;
  if (el) styleEvent({ event: event, el: el });

  // бекенд
  await fetch("https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      action: "reschedule",
      visitId: event.extendedProps.visitId,
      newDate: newDate,
      newTime: newTime,
      status: "Перенесено"
    })
  });
}
async function addVisit() {

  const date = document.getElementById("visitDate").value;

  const today = new Date();

  const chosenDate = new Date(date);

  if (chosenDate < today) {
    alert("Не можна запланувати візит у минуле");

  }

  if (!isValidSlot(time)) {
    alert("Час має бути між 08:00 і 18:30 з кроком 30 хв");

  }

  };

  // локально у календарі
  calendar.addEvent({

    end: endDateTime.toISOString(),

  });

 // бекенд
await fetch("https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec", {
  method: "POST",
  mode: "no-cors",
  headers: { "Content-Type": "application/json" },

async function loadVisits() {
  try {
    const currentUserKey = localStorage.getItem("currentUser");
    const currentUserName = userNames[currentUserKey];

    let localVisits = JSON.parse(localStorage.getItem("visits")) || [];
    renderVisits(localVisits);

    // тягнемо бекенд
    const res = await fetch("https://script.google.com/macros/s/AKfycbz_uLWhj_ww5YLdnrdgGWu9l2AGraznsiGjVSV8dnMuPygaK8vJRKlv-7O9Ou0krKzIAA/exec?type=calendar");
     if (!res.ok) throw new Error("Backend error: " + res.status);

    const backendVisits = await res.json();
    const myVisits = backendVisits.filter(v => v.userName === currentUserName);

    if (JSON.stringify(localVisits) !== JSON.stringify(myVisits)) {
      localStorage.setItem("visits", JSON.stringify(myVisits));
      renderVisits(myVisits);
    }
  } catch (err) {
    console.error("Помилка завантаження:", err);
  }

}

function renderVisits(visits) {
  calendar.getEvents().forEach(e => e.remove());

  visits.forEach(v => {
    const startDateTime = normalizeDate(v.date, v.time);
    if (isNaN(startDateTime.getTime())) {
      console.warn("Некоректна дата/час у візиті:", v);
      return;
    }

    const endDateTime = new Date(startDateTime);
    endDateTime.setMinutes(endDateTime.getMinutes() + 30);

    calendar.addEvent({
      id: v.visitId,
      title: `${v.status}: ${v.partnerName}`,
      start: startDateTime,
      end: endDateTime,
      extendedProps: v
    });
  });
}




function getPartnerIdByName(name) {
  const partners = JSON.parse(localStorage.getItem("partners")) || [];
  const partner = partners.find(p => p.name === name);
  return partner ? partner.id : 0;
}

function normalizeDate(dateStr, timeStr) {
  // якщо час у форматі "8:00" → перетворюємо на "08:00"
  if (timeStr) {
    const [h, m] = timeStr.split(":");
    const hh = h.padStart(2, "0");
    timeStr = `${hh}:${m}`;
  } else {
    timeStr = "00:00";
  }

  return new Date(`${dateStr}T${timeStr}`);
}
