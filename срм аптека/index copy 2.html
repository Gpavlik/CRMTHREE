<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Політ над пейзажем</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to top, #87ceeb, #f0f8ff);
      overflow: hidden;
      /*animation: horizonShift 6s ease-in-out infinite;*/
    }

    @keyframes horizonShift {
      0%, 100% { background-position: 0 0; }
      50% { background-position: 0 1000px; }
    }

    /* Сонце */
    .sun {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, #ffd700, #ffa500);
      border-radius: 50%;
      box-shadow: 0 0 40px 20px rgba(255, 215, 0, 0.6);
      animation: pulse 4s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.1); }
    }

    /* Земля */
    .ground {
      position: absolute;
      bottom: 20px;;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, #228b22 20%, transparent 80%);
      animation: moveGround 8s linear infinite;
      animation-direction: alternate;
    }
    @keyframes moveGround {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(100%) scale(2); }
    }

    /* Об'єкти на землі */
    .object {
      position: absolute;
      bottom: 120px; /* трохи вище, щоб бачити більше дерев */
      animation: flyPerspective 8s linear infinite;
    }
    @keyframes flyPerspective {
      0% { transform: translateY(0) scale(0.3); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(100vh) scale(3); opacity: 0; }
    }

    /* Дерево */
    .tree {
      width: 40px; height: 120px;
      background: #8b5a2b;
    }
    .tree::before {
      content: '';
      position: absolute;
      bottom: 80px; left: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, #228b22, #006400);
      border-radius: 50%;
    }

    /* Кущ */
    .bush {
      width: 80px; height: 40px;
      background: radial-gradient(circle, #006400, #228b22);
      border-radius: 50%;
    }

    /* Квітка */
    .flower {
      width: 20px; height: 20px;
      background: radial-gradient(circle, #ff69b4, #ff1493);
      border-radius: 50%;
    }

    /* Хмарки */
    .cloud {
      position: absolute;
      top: 100px;
      width: 100px; height: 60px;
      background: #fff;
      border-radius: 50%;
      animation: flyBird 15s linear infinite, flyPerspective 100s linear infinite; 
    }
    @keyframes floatCloud {
      from { left: -150px; }

      to { left: 120vw; }
    }

    /* Пташки */
    .bird { position: absolute; 
      top: 200px; 
      width: 40px; 
      height: 20px; 
      border-top: 3px solid black; 
      border-radius: 50%; 
      animation: flyBird 15s linear infinite, flyPerspective 200s linear infinite; 
    }
    
    .bird::after {
      content: '';
      position: absolute;
      width: 40px; height: 20px;
      left: 20px;
      border-top: 3px solid black;
      border-radius: 50%;

    }
    @keyframes flyBird {
      from { left: -50px; }
      to { left: 120vw; }
    }
  </style>
</head>
<body>
  <div class="sun"></div>
  <div class="ground"></div>

  <!-- Об'єкти на землі -->
  <div class="object tree" style="left: 20%; animation-delay: 0s;"></div>
  <div class="object bush" style="left: 40%; animation-delay: 2s;"></div>
  <div class="object flower" style="left: 60%; animation-delay: 4s;"></div>
  <div class="object tree" style="left: 80%; animation-delay: 6s;"></div>

  <!-- Хмарки -->
  <div class="cloud" style="top: 120px; animation-delay: 0s;"></div>
  <div class="cloud" style="top: 180px; animation-delay: 10s;"></div>

  <!-- Пташки -->
  <div class="bird" style="top: 220px; animation-delay: 5s;"></div>
  <div class="bird" style="top: 260px; animation-delay: 12s;"></div>
</body>
</html>
